string = Leadership_Descr, "领导力表示你对周围人的影响力，以及你实现目标的能力。"
string = Sailing_Descr, "航海表示你操控船只的能力，并影响其速度和机动性。"
string = Fencing_Descr, "剑术对每位船长都至关重要，因为你的生死往往取决于挥剑的本领。"
string = Gun_Descr, "一次精准的射击，击杀一名或多名敌人，可能会救你一命。"
string = Cannons_Descr, "该技能影响火炮的装填速度和射击散布。"
string = Accuracy_Descr, "该技能表示你精准发射炮击的能力。"
string = Grappling_Descr, "该技能体现你选择最佳登船位置、距离和时机的能力，以及船员协同作战、赢得胜利的本领。"
string = Defence_Descr, "舒适的船员舱、良好的卫生和治疗伤员能提升激烈战斗和长途航行后的幸存人数。"
string = Repair_Descr, "对船只及其结构的熟悉，使你能更高效地调配修理船员。"
string = Commerce_Descr, "善于讨价还价、凭眼力判断货物质量，以及广泛的人脉关系，都能让你在交易中获得更多利益。"
string = Sneak_Descr, "运气、预见、对危险或轻松获利的敏感——这个技能越高，你就越幸运。"
string = Navigator_Descr, "无论是风平浪静还是狂风暴雨，能够有效掌控船只的能力对船长来说至关重要，而领航员正是协助他实现这一点的人。在激烈的海战中，领航员往往能在最后关头转动舵轮，让船只躲过敌人的炮火。"
string = Boatswain_Descr, "人们常说，水手长仿佛生于船上。他们对本职和海上生活的琐事了如指掌，无人能及。优秀的水手长懂得如何发挥船只的最大潜力，激励船员迎接战斗，也知道如何让船再次脱困。"
string = Cannoner_Descr, "一名熟练的炮手能在海战中瞬间扭转局势。他的经验和技巧让舰炮射击更加精准。此外，炮手还会确保舰炮始终干燥，随时准备投入战斗。"
string = Doctor_Descr, "船医负责照顾在战斗中受伤的船员。他需要能够截肢、缝合伤口、预防疫病，并为船员提供其他医疗救助。一位优秀的船医能挽救许多人的生命。"
string = Treasurer_Descr, "财务官负责管理你的货舱和所有货物。此外，财务官通常是经验丰富的商人，能帮助船长以低价采购物品并谈判有利的价格。"
string = Carpenter_Descr, "一位出色的木匠能够修复风暴或敌人炮火对船只造成的损伤。大多数情况下，他会在战斗结束后立即开始修理。经验丰富的木匠清楚哪些地方必须优先修补，才能让船继续漂浮。"
string = Officer_Descr, "生活充满了危险和意外。黑暗的小巷里可能有劫匪埋伏，登船战斗时也可能被流弹击中。这就是你需要先锋的原因——他就是你的贴身保镖。"
string = Companion_Descr, "同伴。"
string = Passenger_Descr, "乘客。"
