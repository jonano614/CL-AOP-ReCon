string = QuestsBook, "任务日志"
string = QuestsBook_Descr, "这里显示当前任务、活跃的剧情事件以及主角的行动。在出现的按时间顺序排列的主题事件列表中，每条新记录都会标注加入日志的时间，并置于上一条之上。未读记录会以颜色高亮显示。"
string = QuestsLogBook, "任务档案"
string = QuestsLogBook_Descr, "这里显示已完成任务、委托和已结束的剧情冒险列表。"
string = DocsBook, "文件"
string = DocsBook_Descr, "这里展示主角在游戏中获得的各类文件（手稿及其片段、信件和便条、说明和各种配方）。请不时查阅本区的资料，它们可能包含线索或提及近期的重要事件。未读文件会以颜色高亮显示。"
string = CashBook, "现金簿"
string = CashBook_Descr1, "这里显示主角所有金融业务的记录，包括他收到的贷款（左侧列表）或转出的放贷（右侧列表）。除了银行贷款或存款金额外，记录还包含其他信息（利率、日期、期限和货币类型）。"
string = CashBook_Descr2, "重要！如果放贷的定居点被洗劫，押金将消失，相关记录也会从账本中移除。"
string = ShipsPlaceBook, "港务局内的船只"
string = ShipsPlaceBook_Descr1, "这里显示主角当前可用、已存放在仓库的船只。列表中包含每艘船的信息（级别、船名、船长姓名、租用泊位的位置、存放日期以及每月存储费用）。"
string = ShipsPlaceBook_Descr2, "按住SHIFT并点击左键查看船只信息"
string = ShipsPlaceBook_Descr3, "按住CTRL并点击左键可查看船长信息"
string = StorageBook, "仓库账本"
string = StorageBook_Descr, "这里显示已租用仓库或库房的记录（包括其位置、已用和可用空间、每月租金）。"
string = TradeBook, "贸易日志"
string = TradeBook_Descr1, "此处列出了定居点的国籍、名称、位置，以及右侧表格中库存状态和价格的记录日期。每当主角获得新的贸易信息时，列表会自动更新。随着时间推移，信息会逐渐过时，因为游戏中的贸易系统会自行变化，但这些数据仍能帮助你做出主要判断。游戏开始时，列表为空。要尽可能全面且快速地更新记录，请抓住一切机会，从海上的商人、酒馆或传闻中了解远方定居点的商品价格。"
string = TradeBook_Descr2, "商品种类繁多：有些只在群岛上生产或种植，有些则来自大陆，还有一些是从遥远的欧洲进口的。定居点出口的商品价格不高，而进口商品则相反，自然要贵得多。如果某种商品需求量大而数量稀少，它就会变成走私品——不再在商店中出售。一些危险品（如武器和火药）甚至可能被当地当局禁止在官方贸易中流通。"
string = TradeBook_Descr3, "商品类型指示颜色：\n- 绿色：殖民地商品\n- 蓝色：进口商品\n- 红色：走私商品\n- 桃色：高需求商品"
string = StatisticsBook, "统计手册"
string = StatisticsBook_Descr, "此处显示游戏事件的汇总记录（击败的对手数、获得的奖品、花费的金钱等）。"
