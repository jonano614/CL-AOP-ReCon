string = ChatacterInderfaceDescr_1, "指派军官时同样有效 "
string = ChatacterInderfaceDescr_2, "，拥有此特性的角色。"
string = ChatacterInderfaceDescr_3, "此特质无需消耗点数。"
string = ChatacterInderfaceDescr_4, "创建你的英雄"
string = ChatacterInderfaceDescr_5, "要更改英雄属性，请点击属性并使用箭头重新分配点数。\n技能会根据所选的 P.I.R.A.T.E.S 自动重新计算。\n\n分配完成后，可点击叉号或按 Esc 关闭界面。"
string = ChatacterInderfaceDescr_6, "提升属性"
string = ChatacterInderfaceDescr_7, "要提升英雄能力，请选择相应属性并用箭头添加点数。请注意，能力点无法重新分配，只能使用可用点数。分配完成后，可点击叉号或按Esc关闭界面。如果在未分配完所有点数时中断仪式，剩余点数将会丢失！"
string = ChatacterInderfaceDescr_8, "点击列表以任命或解除军官。"
string = ChatacterInderfaceDescr_9, "在没有悬赏通缉的情况下，如果你在敌方城市中静止不动或只是从士兵身边走过，有机会保持匿名身份。"
string = ChatacterInderfaceDescr_10, "\n如果潜行和/或运气达到最大值，带有这些技能加成的物品将获得第二次机会：\n加成时+10%（有惩罚时-10%）从数值转为概率。\n\n夜晚时，基础概率减半。\n\n额外加成（夜晚不受惩罚影响）：\n花5000找吉普赛人占卜可获得+5%，持续7天\n“欺诈艺术”特质提供+5%\n\n公式：\n“I” + “S” + ((“潜行” / 3) + (“运气” / 4)) + 物品加成\惩罚 + 额外加成\n"
string = ChatacterInderfaceDescr_11, "靠近士兵时以步行而非奔跑移动的潜行几率："
