string = GameMenuHelper_2, "角色动画："
string = GameMenuHelper_3, "\n重要提示：\n如果更新补丁后角色无法移动，请进入游戏设置，点击“恢复默认”，然后点击“应用”。\n如果帧率（FPS）较低，请降低分辨率，或在启动器中将 MSAA 参数从 16 改为 2。\n建议不要在 engine.ini 中设置过高的 FPS（最佳范围为 60-100），或在启动器中开启垂直同步（V-Sync）。\n建议使用新的配置文件名称开始新游戏！\n反馈建议：\n您可以在“Steam 社区”留言。\n如需更快捷、更高效的在线技术支持，请访问我们的 Discord 服务器。\n祝您游戏愉快！"
