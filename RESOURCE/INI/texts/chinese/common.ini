string = TradeInterfaceTitle, "交易界面"
string = TradeInterfaceDescr_1, "双击或按回车键表格行可打开货物买卖界面。 "
string = TradeInterfaceDescr_2, "在表格行上按 Shift + 左/右键会自动调出已预设最大买入/卖出数量的表单。 "
string = TradeInterfaceDescr_3, "在键盘输入正数表示购买商品，输入负数表示出售商品。"
string = TradeInterfaceDescr_4, "左右箭头按包更改数量，Shift + 左右箭头为最大可用。表单中按 Enter 等同于确定，Esc 为取消。"
string = TradeInterfaceDescr_5, "在表单模式下，使用上下箭头滚动表格列表时，可以查看表格光标下商品的描述。"
string = TradeInterfaceDescr_6, "快速出售全部：列表上下箭头，Shift + 右键，Enter"
string = TradeInterfaceDescr_7, "商品颜色区分"
string = TradeInterfaceDescr_8, "有贸易助手"
string = TradeInterfaceDescr_9, "快速全部领取：列表上下箭头，Shift+右键，Enter。"
string = TradeInterfaceDescr_10, "出售列表中不包含角色已装备的物品。"
string = TradeInterfaceDescr_11, "双击或按回车键表格行可打开物品买卖界面。 "
string = TradeInterfaceDescr_12, "在表格行上按 Shift + 左/右键会自动打开表单，并将买入/卖出数量预设为最大值。 "
string = TradeInterfaceDescr_13, "从键盘输入正数表示购买该物品，输入负数（带负号）表示出售。"
string = TradeInterfaceDescr_14, "在表单模式下，使用上下箭头滚动表格列表时，可以查看表格光标下物品的描述。"
string = TradeInterfaceDescr_15, "在船舱里"
string = CannonsTradeInterfaceDescr_1, "可以在船上安装火炮"
string = CannonsTradeInterfaceDescr_2, "无法在船上安装火炮"
string = CannonsTradeInterfaceDescr_3, "已安装在船上的火炮"
string = AlchemyInterfaceDescr_1, "要制作物品，请先在上方的可用配方列表中选择物品，然后使用下方的箭头设置所需数量。\n"
string = AlchemyInterfaceDescr_2, "然后点击“创建”按钮（当组件数量符合配方要求时按钮会变为可用）。\n\n已装备的物品不会显示在可用组件列表中。"
string = AlchemyInterfaceDescr_3, "在你的船舱内，所有存放在箱子里的组件和工具都可直接使用——无需转移到你的背包。\n\n"
string = AlchemyInterfaceDescr_4, "右键点击以关闭此消息。"
