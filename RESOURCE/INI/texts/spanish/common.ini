string = Leadership_Descr, "El liderazgo indica cuánta influencia tienes sobre las personas a tu alrededor y qué tan bien puedes alcanzar tus objetivos."
string = Sailing_Descr, "La Navegación indica tu habilidad para controlar el barco y afecta su velocidad y maniobrabilidad."
string = Fencing_Descr, "La esgrima es fundamental para cualquier capitán, ya que tu supervivencia a menudo dependerá de tu destreza con la espada."
string = Gun_Descr, "Un disparo certero, que elimine a uno o varios enemigos, puede salvarte la vida."
string = Cannons_Descr, "Esta habilidad influye en el tiempo de recarga de tus cañones y en el patrón de disparo."
string = Accuracy_Descr, "Esta habilidad indica tu capacidad para acertar con la andanada de cañones."
string = Grappling_Descr, "Esta habilidad refleja tu capacidad para elegir el mejor lugar, distancia y momento para abordar, así como la habilidad de tu tripulación para luchar hasta la victoria."
string = Defence_Descr, "Camarotes cómodos, higiene y curación de heridos aumentan el número de supervivientes tras duras batallas y largos viajes."
string = Repair_Descr, "Un buen conocimiento de tu barco y su construcción permite utilizar a la tripulación de reparación de manera más eficaz."
string = Commerce_Descr, "La habilidad para negociar, evaluar la calidad de las mercancías a simple vista y tus amplias conexiones te permiten realizar operaciones comerciales con mayor beneficio para ti."
string = Sneak_Descr, "Suerte, previsión, instinto para el peligro o el dinero fácil: cuanto más desarrolles esta habilidad, más afortunado serás."
string = Navigator_Descr, "La habilidad de controlar el barco con eficacia, ya sea en calma total o en medio de una tormenta furiosa, es fundamental para un capitán, y el navegante es quien lo ayudará en esa tarea. Durante un combate encarnizado, puede ser él quien gire el timón en el último instante, salvando el barco de una andanada enemiga."
string = Boatswain_Descr, "Dicen que los contramaestres nacen en sus propios barcos. Su conocimiento del oficio y de los detalles de la vida en el mar no tiene igual. Un buen contramaestre sabe cómo sacar el máximo provecho de su barco, cómo inspirar a la tripulación antes de la batalla y cómo volver a poner el barco a flote."
string = Cannoner_Descr, "Un artillero experimentado puede cambiar el rumbo de un combate naval al instante. Su experiencia y habilidades permiten que los cañones del barco disparen con mayor precisión. Además, el artillero se asegura de que los cañones estén siempre secos y listos para la batalla."
string = Doctor_Descr, "El médico de a bordo se encarga de quienes resultan heridos en combate. Debe saber amputar miembros, suturar heridas, prevenir epidemias y brindar otros cuidados médicos a la tripulación. Un buen médico puede salvar la vida de muchos de tus hombres."
string = Treasurer_Descr, "El tesorero se encarga de la bodega y de todas las mercancías a bordo. Además, siempre es un comerciante experimentado que puede ayudar al capitán a conseguir buenos precios y negociar condiciones favorables."
string = Carpenter_Descr, "Un buen carpintero puede reparar los daños causados al barco por tormentas o fuego enemigo. La mayoría de las veces comienza las reparaciones justo después de una batalla. Un carpintero experimentado sabe exactamente qué debe arreglar primero para mantener el barco a flote."
string = Officer_Descr, "La vida está llena de peligros y sorpresas. Unos ladrones pueden acecharte en un callejón oscuro, y durante un abordaje podrías recibir una bala perdida. Por eso necesitas un Abordador: alguien que, en esencia, es tu guardaespaldas."
