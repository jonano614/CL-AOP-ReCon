string = MessageCrewCheckbox_4, "Reasignación de tripulación"
string = MaxCrewSend, "hasta el máximo"
string = MaxCrewSend_descr, "Toda la tripulación de este barco se distribuirá entre tu escuadrón hasta los valores máximos, teniendo en cuenta la sobrecarga, comenzando por el buque insignia."
string = MessageCrewCheckbox_1, "Al elegir la opción 'hasta el máximo', toda la tripulación de este navío se distribuirá entre los barcos de tu escuadrón hasta los valores máximos, teniendo en cuenta la sobrecarga y comenzando por el buque insignia. En este caso, la tripulación se llena hasta la sobrecarga. Las habilidades y la moral de la tripulación se recalculan."
string = OptCrewSend, "a un nivel óptimo"
string = OptCrewSend_descr, "Toda la tripulación de este navío se distribuirá entre tu escuadra hasta alcanzar los valores óptimos sin sobrecarga, comenzando por el buque insignia."
string = MessageCrewCheckbox_2, "Al elegir la opción 'a óptimo', toda la tripulación de este barco se distribuirá entre los barcos de tu escuadrón hasta los valores óptimos, sin sobrecarga, comenzando por el buque insignia. Las habilidades y la moral de la tripulación se recalculan."
string = FireEveryone, "licenciado en tierra"
string = FireEveryone_descr, "Toda la tripulación de este barco será desembarcada en la taberna en tierra, a la espera de un nuevo reclutamiento."
string = MessageCrewCheckbox_3, "Al elegir la opción 'desembarcar en tierra', toda la tripulación de este barco será enviada a la taberna en tierra, fusionando sus habilidades con los candidatos que ya están en la taberna."
string = MessageGoodCheckbox_4, "Redistribución de bienes"
string = GoodsToShip, "cargar en el buque insignia"
string = GoodsToShip_descr, "Todos los bienes serán transferidos al buque insignia, sin tener en cuenta la sobrecarga del navío."
string = MessageGoodCheckbox_2, "Al elegir la opción 'cargar en el buque insignia', todas las mercancías se transferirán al buque insignia, sin tener en cuenta la sobrecarga de la nave."
string = GoodsToStore, "vender a la tienda"
string = GoodsToStore_descr, "Todos los bienes se venderán a los precios actuales de la colonia. El contrabando se carga en la nave insignia, sin tener en cuenta la sobrecarga. Si la nave insignia está atracada en los astilleros, el contrabando será destruido."
string = MessageGoodCheckbox_1, "Al elegir la opción 'vender en tienda', todas las mercancías se venderán a los precios actuales de la colonia. El contrabando se cargará en la nave insignia, sin tener en cuenta la sobrecarga. Si la nave insignia está atracada en los astilleros, el contrabando será destruido."
string = GoodsToWarehouse, "descargar en el almacén"
