string = QuestsBook, "Libro de misiones"
string = QuestsBook_Descr, "Aquí se muestra una lista de las misiones actuales, los eventos de la historia activos y las acciones del protagonista. En la lista cronológica de eventos temáticos que aparece, cada nueva entrada se marca con la hora en que fue registrada en el diario y se coloca encima de las anteriores. Las entradas no leídas se resaltan en color."
string = QuestsLogBook, "Archivo de misiones"
string = QuestsLogBook_Descr, "Aquí se muestra una lista de misiones completadas, encargos y aventuras de historia finalizadas."
string = DocsBook, "Documentos"
string = DocsBook_Descr, "Aquí se muestran diversos documentos recibidos por el protagonista en el juego (manuscritos y sus fragmentos, cartas y notas simples, instrucciones y todo tipo de recetas). Revisa de vez en cuando los materiales guardados en esta sección. Pueden contener pistas o mencionar eventos importantes del pasado reciente. Los documentos no leídos se resaltan en color."
string = CashBook, "Libro de caja"
string = CashBook_Descr1, "Aquí se muestran los registros de todas las operaciones financieras del personaje principal, los préstamos que ha recibido (lista a la izquierda) o los que ha concedido (lista a la derecha). Además del monto del préstamo o depósito en la casa bancaria, los registros contienen información adicional (tasas de interés, fechas, plazos y tipo de moneda)."
string = CashBook_Descr2, "¡Importante! Si el asentamiento cuyo prestamista recibió el dinero con intereses es saqueado, el depósito desaparece y su registro se elimina del libro."
string = ShipsPlaceBook, "Barcos en la Autoridad Portuaria"
string = ShipsPlaceBook_Descr1, "Aquí puedes ver los barcos que actualmente están a disposición del protagonista y que han sido almacenados. La lista muestra información sobre cada nave (clase, nombre del barco, nombre del capitán, ubicación del atraque alquilado, fecha de almacenamiento y tarifa mensual de almacenamiento)."
string = ShipsPlaceBook_Descr2, "Pulsa SHIFT + LMB para información del barco"
string = ShipsPlaceBook_Descr3, "Pulsa CTRL + LMB para información sobre el capitán"
string = StorageBook, "Libro de almacén"
string = StorageBook_Descr, "Aquí se muestran los registros de almacenes o depósitos alquilados (su ubicación, espacio utilizado y disponible, y el pago mensual de alquiler)."
string = TradeBook, "Libro de comercio"
string = TradeBook_Descr1, "Aquí se indica la nacionalidad y el nombre del asentamiento, su ubicación y la fecha en que se registraron el estado del inventario y los precios en la tabla de la derecha. La lista se actualiza cada vez que el héroe recibe nueva información comercial. Con el tiempo, la información se vuelve obsoleta, ya que el comercio en el juego sigue su propio curso, pero permite sacar conclusiones principales. Al principio del juego, la lista está vacía. Para actualizar los registros de la forma más completa y rápida posible, aprovecha cualquier oportunidad para averiguar los precios de los bienes en asentamientos lejanos, ya sea preguntando a mercaderes en el mar o en la taberna, así como escuchando rumores."
string = TradeBook_Descr2, "La lista de mercancías es bastante amplia: algunas se producen o cultivan solo en las islas, otras en el continente, y ciertos bienes se importan desde la lejana Europa. Los productos que exporta el asentamiento no son caros, pero los importados, por supuesto, sí lo son. Si la demanda de un producto es alta y la cantidad escasa, se convierte en contrabando: deja de venderse en las tiendas. Algunos bienes peligrosos (por ejemplo, armas y pólvora) incluso pueden ser prohibidos en el comercio oficial por decisión de las autoridades locales."
string = TradeBook_Descr3, "Colores del indicador de tipo de producto:\n- Verde: bienes coloniales\n- Azul: bienes importados\n- Rojo: bienes de contrabando\n- Durazno: bienes de demanda agresiva"
string = StatisticsBook, "Libro de estadísticas"
string = StatisticsBook_Descr, "Aquí se muestran los registros resumidos de los eventos del juego (número de oponentes derrotados, premios obtenidos, dinero gastado, etc.)."
