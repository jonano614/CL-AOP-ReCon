string = GameMenuHelper_1, "Condiciones iniciales y ayuda"
string = GameMenuHelper_2, "Animación de personaje: "
string = GameMenuHelper_3, "\nImportante:\nSi el personaje deja de moverse tras el parche, ve a los ajustes del juego y pulsa 'Predeterminado' y luego 'Aceptar'.\nSi los FPS son bajos, reduce la resolución o cambia el parámetro MSAA de 16 a 2 en el lanzador.\nRecomendamos no poner un FPS muy alto en engine.ini (lo óptimo es 60-100) o activar la sincronización vertical en el lanzador.\n¡Se recomienda empezar una Nueva Partida con un nombre de perfil nuevo!\nComentarios:\nPuedes escribir tus comentarios en la 'Comunidad de Steam'.\nPara recibir un soporte en línea más rápido y eficaz, únete a nuestro servidor de Discord.\n¡Buena suerte y disfruta del juego!"
