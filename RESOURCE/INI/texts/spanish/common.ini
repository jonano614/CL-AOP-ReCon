string = Surrendered_crew, "El enemigo ha decidido rendirse a tu merced sin luchar."
string = Surrendered_captain, "Al comprender que resistirse era inútil, el capitán y los tripulantes restantes se han puesto a tu merced."
string = Surrendered_text_1, "No es posible mover la tripulación entre barcos que no te pertenecen. Para completar la captura de un barco, debes destituir a su capitán y nombrar uno propio."
string = Surrendered_text_2, "Quitar al capitán del barco rendido te impedirá dejarlo ir después de saquearlo. ¿Continuar?"
string = Surrendered_exit_1, "El barco se ha quedado sin capitán. ¿Hundirlo?"
string = Surrendered_exit_2, "¿Terminas el saqueo y dejas en libertad al capitán rendido y a su tripulación? Han prometido que no volverán a dispararnos."
