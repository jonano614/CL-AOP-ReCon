string = ChatacterInderfaceDescr_1, "También funcionará si se asigna un oficial "
string = ChatacterInderfaceDescr_2, ", que tiene esta destreza."
string = ChatacterInderfaceDescr_3, "Esta destreza no cuesta puntos."
string = ChatacterInderfaceDescr_4, "Crea tu propio héroe"
string = ChatacterInderfaceDescr_5, "Para cambiar las habilidades del héroe, haz clic en ellas y usa las flechas para redistribuir los puntos.\nLas habilidades se recalcularán automáticamente según los P.I.R.A.T.E.S. seleccionados.\n\nCierra el formulario con la cruz o Esc cuando termines la distribución."
string = ChatacterInderfaceDescr_6, "Aumentar habilidades"
string = ChatacterInderfaceDescr_7, "Para aumentar las habilidades del héroe, selecciónalas y añade puntos usando las flechas. Ten en cuenta que no puedes redistribuir las habilidades: solo puedes gastar los puntos disponibles. Cierra el formulario con la cruz o Esc cuando termines la distribución. Si interrumpes el ritual sin asignar todos los puntos, los restantes se perderán."
string = ChatacterInderfaceDescr_8, "Haz clic en la lista para asignar o suspender a un oficial."
string = ChatacterInderfaceDescr_9, "Si no hay recompensa por tu cabeza, si te quedas quieto en una ciudad enemiga sin hacer nada, o pasas junto a los soldados, existe la posibilidad de permanecer de incógnito."
string = ChatacterInderfaceDescr_10, "\nSi Sigilo y/o Suerte están al máximo, los objetos con bonificación a estas habilidades obtienen una segunda vida:\n+10% (-10% si hay penalización) del valor al porcentaje de probabilidad.\n\nPor la noche, la probabilidad base se reduce a la mitad.\n\nBonificaciones extra (no se ven afectadas por penalizaciones nocturnas):\nLa adivinación gitana por 5000 otorga +5% durante 7 días\nLa ventaja 'Arte del Engaño' da +5%\n\nFórmula:\n'I' + 'S' + (('Sigilo' / 3) + ('Suerte' / 4)) + bonificaciones/penalizaciones de objetos + bonificaciones extra\n"
string = ChatacterInderfaceDescr_11, "Probabilidad de sigilo al caminar en vez de correr junto a soldados: "
