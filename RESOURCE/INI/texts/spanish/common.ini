string = TradeInterfaceTitle, "Interfaz de comercio"
string = TradeInterfaceDescr_1, "Hacer doble clic o pulsar Enter en las filas de la tabla abre el formulario de compra/venta de mercancías. "
string = TradeInterfaceDescr_2, "Shift + izquierda/derecha en las filas de la tabla abre automáticamente el formulario con la cantidad máxima preestablecida de compra/venta. "
string = TradeInterfaceDescr_3, "Ingresar una cantidad positiva desde el teclado indica la compra de los bienes, y una cantidad negativa indica la venta."
string = TradeInterfaceDescr_4, "Las flechas izquierda/derecha cambian la cantidad por paquetes, y Shift + izquierda/derecha al máximo disponible. Pulsar Enter en el formulario equivale a OK, y Esc a Cancelar."
string = TradeInterfaceDescr_5, "Mientras estés en el modo de formulario y navegues por la lista en la tabla con las flechas arriba/abajo, puedes ver la descripción de los bienes bajo el cursor de la tabla."
string = TradeInterfaceDescr_6, "Venta rápida de todo: flechas arriba/abajo en la lista, Shift + derecha, Enter"
string = TradeInterfaceDescr_7, "Diferenciación de color de los bienes"
string = TradeInterfaceDescr_8, "Con un asistente de comercio"
string = TradeInterfaceDescr_9, "Toma todo rápidamente: flechas arriba/abajo en la lista, Shift + derecha, Enter."
string = TradeInterfaceDescr_10, "La lista de venta no incluye los objetos equipados por el personaje."
string = TradeInterfaceDescr_11, "Hacer doble clic o pulsar Enter sobre las filas de la tabla abre el formulario de compra/venta de objetos. "
string = TradeInterfaceDescr_12, "Shift + izquierda/derecha en las filas de la tabla abre automáticamente un formulario con la cantidad de compra/venta establecida al máximo. "
string = TradeInterfaceDescr_13, "Ingresar una cantidad positiva desde el teclado indica la compra del artículo, y una cantidad negativa (con signo menos) indica la venta."
string = TradeInterfaceDescr_14, "Mientras estés en modo formulario y navegues por la lista de la tabla con las flechas arriba/abajo, puedes ver la descripción del elemento bajo el cursor de la tabla."
string = TradeInterfaceDescr_15, "en la cabina"
string = CannonsTradeInterfaceDescr_1, "se pueden instalar cañones en el barco"
string = CannonsTradeInterfaceDescr_2, "no se pueden instalar cañones en el barco"
string = CannonsTradeInterfaceDescr_3, "cañones ya instalados en el barco"
string = AlchemyInterfaceDescr_1, "Para fabricar objetos, selecciona uno de los recetas disponibles en la parte superior y usa las flechas en la parte inferior para elegir la cantidad deseada.\n"
string = AlchemyInterfaceDescr_2, "Luego pulsa el botón 'Crear' (se activará cuando la cantidad de componentes coincida con los requisitos de la receta).\n\nLos objetos equipados no aparecen en la lista de componentes disponibles."
string = AlchemyInterfaceDescr_3, "Mientras estés en tu camarote, todos los componentes y herramientas guardados en los cofres estarán disponibles; no es necesario moverlos a tu inventario.\n\n"
string = AlchemyInterfaceDescr_4, "Haz clic derecho para cerrar este mensaje."
