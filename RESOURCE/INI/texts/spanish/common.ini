string = Max_crew_text1, "La tripulación puede superar el máximo permitido, pero esto provoca sobrecarga y las condiciones de vida a bordo se vuelven terribles, lo que lleva a una caída diaria de la moral. En promedio, se puede embarcar hasta un 25% más de marineros."
