string = ItemsHelper_7, "Inserir um valor positivo pelo teclado define o item a ser retirado, e um valor negativo define a devolução."
string = ItemsHelper_8, "As setas para a esquerda/direita alteram a quantidade uma a uma, e Shift + esquerda/direita para o máximo disponível. Pressionar Enter em um formulário equivale a OK, e Esc a Cancelar."
