string = QuestsBook, "Livro de Missões"
string = QuestsBook_Descr, "Aqui é exibida uma lista das missões atuais, eventos de história ativos e as ações do personagem principal. Na lista cronológica de eventos temáticos que aparece, cada nova entrada é marcada com o horário em que foi registrada no diário e posicionada acima das anteriores. Entradas não lidas são destacadas em cores."
string = QuestsLogBook, "Arquivo de missões"
string = QuestsLogBook_Descr, "Aqui é exibida uma lista de missões concluídas, tarefas e aventuras de história finalizadas."
string = DocsBook, "Documentos"
string = DocsBook_Descr, "Aqui são exibidos diversos documentos recebidos pelo personagem principal no jogo (manuscritos e seus fragmentos, cartas e bilhetes simples, instruções e todo tipo de receita). De tempos em tempos, revise os materiais colocados nesta seção. Eles podem conter dicas ou mencionar eventos importantes do passado recente. Documentos não lidos são destacados em cores."
string = CashBook, "Livro-caixa"
string = CashBook_Descr1, "Aqui são exibidos os registros de todos os empreendimentos financeiros do personagem principal, empréstimos recebidos por ele (lista à esquerda) ou concedidos por ele (lista à direita). Além do valor do empréstimo ou depósito na casa bancária, os registros contêm informações adicionais (taxas de juros, datas, prazos e tipo de moeda)."
string = CashBook_Descr2, "Importante! Se o assentamento cujo agiota recebeu dinheiro emprestado for saqueado, o depósito desaparece e o registro é removido do livro."
string = ShipsPlaceBook, "Navios na Autoridade Portuária"
string = ShipsPlaceBook_Descr1, "Aqui você pode ver os navios atualmente à disposição do protagonista que foram colocados em armazenamento. A lista fornece informações sobre cada embarcação (classe, nome do navio, nome do capitão, local do cais alugado, data de armazenamento e taxa mensal de armazenamento)."
string = ShipsPlaceBook_Descr2, "Pressione SHIFT + LMB para informações do navio"
string = ShipsPlaceBook_Descr3, "Pressione CTRL + LMB para informações sobre o capitão"
string = StorageBook, "Livro de Armazenamento"
string = StorageBook_Descr, "Aqui são exibidos os registros de armazéns ou depósitos alugados (localização, espaço utilizado e disponível, valor do aluguel mensal)."
string = TradeBook, "Livro de Comércio"
string = TradeBook_Descr1, "Aqui são listados a nacionalidade e o nome do assentamento, sua localização e a data em que o status do estoque e os preços foram registrados na tabela à direita. A lista é atualizada sempre que o herói recebe novas informações comerciais. Com o tempo, as informações ficam desatualizadas, pois o comércio no jogo segue seu próprio curso, mas ainda permitem tirar conclusões importantes. No início do jogo, a lista está vazia. Para atualizar os registros de forma mais completa e rápida, aproveite todas as oportunidades para descobrir os preços das mercadorias em assentamentos distantes com mercadores no mar ou em tavernas, além de rumores."
string = TradeBook_Descr2, "A lista de mercadorias é bastante extensa: algumas são produzidas ou cultivadas apenas nas ilhas, outras no continente, e certos produtos são importados da distante Europa. As mercadorias exportadas pelo assentamento não são caras, mas as importadas, naturalmente, são o oposto. Se a demanda por um produto é alta e a quantidade é escassa, ele se torna contrabandeado – não é mais vendido nas lojas. Alguns itens perigosos (como armas e pólvora) podem até ser proibidos do comércio oficial por decisão das autoridades locais."
string = TradeBook_Descr3, "Cores do Indicador de Tipo de Produto:\n- Verde: Produtos Coloniais\n- Azul: Produtos Importados\n- Vermelho: Produtos Contrabandeados\n- Pêssego: Produtos de Demanda Agressiva"
string = StatisticsBook, "Livro de Estatísticas"
string = StatisticsBook_Descr, "Os registros resumidos dos eventos do jogo (número de oponentes derrotados, prêmios conquistados, dinheiro gasto, etc.) são exibidos aqui."
