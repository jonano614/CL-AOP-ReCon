string = ChatacterInderfaceDescr_1, "Também funciona se um oficial for designado "
string = ChatacterInderfaceDescr_2, ", que possui esta vantagem."
string = ChatacterInderfaceDescr_3, "Esta vantagem não custa pontos."
string = ChatacterInderfaceDescr_4, "Crie seu próprio herói"
string = ChatacterInderfaceDescr_5, "Para alterar os atributos do herói, clique neles e use as setas para redistribuir os pontos.\nAs habilidades serão recalculadas automaticamente a partir dos P.I.R.A.T.E.S. selecionados.\n\nFeche o formulário com o X ou Esc quando terminar a distribuição."
string = ChatacterInderfaceDescr_6, "Aumentar atributos"
string = ChatacterInderfaceDescr_7, "Para aumentar as habilidades do herói, selecione a desejada e adicione pontos usando as setas. Atenção: não é possível redistribuir habilidades – só é permitido gastar os pontos disponíveis. Feche o formulário com o X ou Esc quando terminar a distribuição. Se interromper o ritual sem distribuir todos os pontos, os pontos restantes serão perdidos!"
string = ChatacterInderfaceDescr_8, "Clique na lista para nomear ou suspender um oficial."
string = ChatacterInderfaceDescr_9, "Na ausência de recompensa pela sua cabeça, se você ficar parado em uma cidade inimiga sem agir, ou passar pelos soldados andando normalmente, há uma chance de permanecer incógnito."
string = ChatacterInderfaceDescr_10, "\nSe Furtividade e/ou Sorte estiverem no máximo, itens com bônus nessas habilidades ganham uma segunda vida:\n+10% (-10% com penalidade) do valor para a chance.\n\nÀ noite, a chance base é reduzida pela metade.\n\nBônus extras (não sofrem penalidades à noite):\nLeitura de sorte cigana por 5000 concede +5% por 7 dias\nA vantagem 'Arte do Engano' concede +5%\n\nFórmula:\n'I' + 'S' + (('Furtividade' / 3) + ('Sorte' / 4)) + bônus/penalidades de itens + bônus extras\n"
string = ChatacterInderfaceDescr_11, "Chance de furtividade ao andar em vez de correr perto de soldados: "
