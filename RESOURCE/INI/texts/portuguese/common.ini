string = MessageCrewCheckbox_4, "Redistribuição da tripulação"
string = MaxCrewSend, "até o máximo"
string = MaxCrewSend_descr, "Toda a tripulação deste navio será distribuída para o seu esquadrão até os valores máximos, considerando a sobrecarga, começando pela nau capitânia."
string = MessageCrewCheckbox_1, "Ao escolher a opção 'até o máximo', toda a tripulação desta embarcação será distribuída para o seu esquadrão até os valores máximos, considerando a sobrecarga, começando pelo navio capitânia. Nesse caso, a tripulação é preenchida até a sobrecarga. As habilidades e o moral da tripulação serão recalculados."
string = OptCrewSend, "para o ideal"
string = OptCrewSend_descr, "Toda a tripulação desta embarcação será distribuída em seu esquadrão até os valores ideais, sem sobrecarga, começando pelo navio capitânia."
string = MessageCrewCheckbox_2, "Ao escolher a opção 'para o ótimo', toda a tripulação deste navio será distribuída entre os navios do seu esquadrão até os valores ideais, sem sobrecarga, começando pelo navio capitânia. As habilidades e a moral da tripulação serão recalculadas."
string = FireEveryone, "dispensado em terra"
string = FireEveryone_descr, "Toda a tripulação deste navio será dispensada para a taverna em terra, aguardando novo recrutamento."
string = MessageCrewCheckbox_3, "Ao escolher a opção 'dispensar em terra', toda a tripulação deste navio será enviada para a taverna em terra, unindo suas habilidades com os candidatos já presentes na taverna."
string = MessageGoodCheckbox_4, "Redistribuição de mercadorias"
string = GoodsToShip, "carregar na nau capitânia"
string = GoodsToShip_descr, "Todas as mercadorias serão transferidas para o navio capitânia, sem considerar a sobrecarga da embarcação."
string = MessageGoodCheckbox_2, "Ao escolher a opção 'carregar no navio capitânia', todas as mercadorias serão transferidas para a capitânia, sem considerar a sobrecarga da embarcação."
string = GoodsToStore, "vender para a loja"
string = GoodsToStore_descr, "Todas as mercadorias serão vendidas pelos preços atuais da colônia. O contrabando é carregado no navio capitânia, sem considerar sobrecarga. Se a capitânia estiver atracada no estaleiro, o contrabando será destruído."
string = MessageGoodCheckbox_1, "Ao escolher a opção 'vender para loja', todas as mercadorias serão vendidas pelos preços atuais da colônia. A carga de contrabando será transferida para o navio capitânia, sem considerar sobrecarga. Se a capitânia estiver atracada nos estaleiros, o contrabando será destruído."
string = GoodsToWarehouse, "descarregar no armazém"
string = GoodsToWarehouse_descr, "Todos os bens serão enviados para o armazém para armazenamento, se disponível."
string = MessageGoodCheckbox_3, "Ao selecionar a opção 'descarregar no armazém', todas as mercadorias serão entregues ao armazém para armazenamento, se disponível."
