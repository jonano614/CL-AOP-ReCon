string = ItemsColonTitle, "Nome do item"
string = ItemsHelper_1, "Nesta interface, você pode visualizar e equipar o personagem com uma sabre, pistola, luneta e couraça. "
string = ItemsHelper_2, "Você também pode ver o status do inventário dos oficiais, companheiros e passageiros. Eles escolhem o equipamento automaticamente quando você lhes dá novos itens. "
string = ItemsHelper_3, "A troca de itens com seus oficiais é feita em terra, pelo comando de troca ou por uma opção de diálogo."
