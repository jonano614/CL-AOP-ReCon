string = GameMenuHelper_1, "Condições iniciais e ajuda"
string = GameMenuHelper_2, "Animação de personagem: "
string = GameMenuHelper_3, "\nImportante:\nSe o personagem parar de se mover após o patch, vá nas configurações do jogo, clique em 'Padrão' e depois em 'Aplicar'.\nSe o FPS estiver baixo, diminua a resolução ou altere o parâmetro MSAA de 16 para 2 no launcher.\nRecomendamos não definir um FPS alto no engine.ini (o ideal é 60-100) ou ativar a sincronização vertical no launcher do jogo.\nÉ recomendável iniciar um Novo Jogo com um novo nome de perfil!\nFeedback:\nVocê pode enviar seu feedback na 'Comunidade Steam'.\nUm suporte online mais rápido e de qualidade só é possível através do nosso servidor no Discord.\nBoa sorte e bom jogo!"
