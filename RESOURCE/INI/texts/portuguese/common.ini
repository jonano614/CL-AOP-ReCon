string = TradeInterfaceTitle, "Interface de comércio"
string = TradeInterfaceDescr_1, "Clicar duas vezes ou pressionar Enter nas linhas da tabela abre o formulário de compra/venda de mercadorias. "
string = TradeInterfaceDescr_2, "Shift + esquerda/direita nas linhas da tabela abre automaticamente o formulário com a quantidade máxima pré-definida de compra/venda. "
string = TradeInterfaceDescr_3, "Inserir uma quantidade positiva pelo teclado define a compra dos bens, e uma quantidade negativa define a venda."
string = TradeInterfaceDescr_4, "Setas esquerda/direita alteram a quantidade por pacotes, e Shift + esquerda/direita para o máximo disponível. Pressionar Enter no formulário equivale a OK, e Esc a Cancelar."
string = TradeInterfaceDescr_5, "No modo de formulário, ao rolar a lista na tabela com as setas para cima/baixo, você pode ver a descrição dos itens sob o cursor da tabela."
string = TradeInterfaceDescr_6, "Venda rápida de tudo: setas para cima/baixo na lista, Shift + direita, Enter"
string = TradeInterfaceDescr_7, "Diferenciação de cor dos produtos"
string = TradeInterfaceDescr_8, "Com assistente de comércio"
string = TradeInterfaceDescr_9, "Pegue tudo rapidamente: setas para cima/baixo na lista, Shift + direita, Enter."
string = TradeInterfaceDescr_10, "A lista de venda não inclui itens equipados pelo personagem."
string = TradeInterfaceDescr_11, "Clicar duas vezes ou pressionar Enter nas linhas da tabela abre o formulário de compra/venda de itens. "
string = TradeInterfaceDescr_12, "Shift + esquerda/direita nas linhas da tabela abre automaticamente um formulário com a quantidade de compra/venda definida no máximo. "
string = TradeInterfaceDescr_13, "Inserir uma quantidade positiva pelo teclado define a compra do item, e uma quantidade negativa (com sinal de menos) define a venda."
string = TradeInterfaceDescr_14, "No modo de formulário, ao rolar a lista na tabela com as setas para cima/baixo, você pode ver a descrição do item sob o cursor da tabela."
string = TradeInterfaceDescr_15, "na cabine"
string = CannonsTradeInterfaceDescr_1, "canhões podem ser instalados no navio"
string = CannonsTradeInterfaceDescr_2, "canhões não podem ser instalados em um navio"
string = CannonsTradeInterfaceDescr_3, "canhões já instalados no navio"
string = AlchemyInterfaceDescr_1, "Para criar itens, selecione um item na lista de receitas disponíveis no topo e use as setas na parte inferior para definir a quantidade desejada.\n"
string = AlchemyInterfaceDescr_2, "Em seguida, pressione o botão 'Criar' (ele ficará ativo quando a quantidade de componentes corresponder aos requisitos da receita).\n\nItens equipados não aparecem na lista de componentes disponíveis."
string = AlchemyInterfaceDescr_3, "Enquanto estiver em sua cabine, todos os componentes e ferramentas guardados nos baús estarão disponíveis — não é necessário movê-los para o inventário.\n\n"
string = AlchemyInterfaceDescr_4, "Clique com o botão direito para fechar esta mensagem."
