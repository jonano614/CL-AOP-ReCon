string = Leadership_Descr, "Liderança indica o quanto você influencia as pessoas ao seu redor e o quão bem consegue alcançar seus objetivos."
string = Sailing_Descr, "Navegação indica sua habilidade de controlar o navio e afeta sua velocidade e manobrabilidade."
string = Fencing_Descr, "Esgrima é essencial para qualquer capitão, pois sua sobrevivência muitas vezes dependerá da sua habilidade com a lâmina."
string = Gun_Descr, "Um tiro bem colocado, que elimina um ou vários inimigos, pode salvar sua vida."
string = Cannons_Descr, "Esta habilidade influencia o tempo de recarga dos seus canhões e o padrão dos disparos."
string = Accuracy_Descr, "Esta habilidade indica sua capacidade de acertar a salva de canhões no momento certo."
string = Grappling_Descr, "Esta habilidade indica sua capacidade de escolher o melhor local, distância e momento para o abordo, além da habilidade da sua tripulação de lutar até a vitória."
string = Defence_Descr, "Acomodações confortáveis, higiene e tratamento dos feridos aumentam o número de sobreviventes após batalhas difíceis e longas jornadas."
string = Repair_Descr, "Bom conhecimento do seu navio e de sua construção permite usar a tripulação de reparo de forma mais eficiente."
string = Commerce_Descr, "Sua habilidade de negociação, o olhar treinado para avaliar mercadorias e uma rede de contatos ampla permitem que você realize operações comerciais com mais vantagem."
string = Sneak_Descr, "Sorte, previsão, senso de perigo ou de lucro fácil — quanto mais você desenvolve essa habilidade, mais sortudo você é."
string = Navigator_Descr, "A habilidade de controlar o navio com eficiência, seja em calmaria ou durante uma tempestade furiosa, é fundamental para o capitão, e o navegador é quem o auxilia nisso. Em combate intenso, ele pode ser aquele que vira o leme no último instante, salvando o navio de uma saraivada inimiga."
string = Boatswain_Descr, "Dizem que os contramestres nascem em seus navios. Seu conhecimento do ofício e das pequenas coisas da vida no mar é incomparável. Um bom contramestre sabe tirar o máximo do navio, motivar a tripulação para a batalha e colocar o navio de volta à tona."
string = Cannoner_Descr, "Um cannoneiro habilidoso pode mudar o rumo de um combate naval em um instante. Sua experiência e habilidades permitem disparos mais precisos com os canhões do navio. Além disso, o cannoneiro garante que os canhões estejam sempre secos e prontos para a batalha."
string = Doctor_Descr, "O médico de bordo cuida dos que se ferem durante os combates. Ele deve ser capaz de amputar membros, suturar feridas, prevenir epidemias e prestar outros tipos de auxílio médico à tripulação. Um bom médico pode salvar a vida de muitos dos seus homens."
string = Treasurer_Descr, "O purser cuida do porão e de todas as mercadorias a bordo. Além disso, um tesoureiro é sempre um comerciante experiente, capaz de ajudar o capitão a negociar preços melhores e comprar itens mais baratos."
string = Carpenter_Descr, "Um bom carpinteiro pode reparar os danos causados à embarcação por tempestades ou fogo inimigo. Na maioria das vezes, ele começa os reparos logo após o fim da batalha. Um carpinteiro habilidoso sabe exatamente o que precisa ser consertado primeiro para manter o navio flutuando."
string = Officer_Descr, "A vida é cheia de perigos e surpresas. Ladrões podem estar à sua espera em um beco escuro, e durante um abordo você pode ser atingido por uma bala perdida. Por isso, você precisa de um Fighter — alguém que, na prática, é seu guarda-costas."
