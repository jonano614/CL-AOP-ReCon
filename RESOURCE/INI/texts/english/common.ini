string = ItemsHelper_1,"In this interface you can view and equip character with a saber, pistol, spyglass and cuirass. "
string = ItemsHelper_2,"You can also view the inventory status of officers, companions and passengers. They make the choice of equipment automatically when you give them new items. "
string = ItemsHelper_3,"Exchanging items with your officers is done on land via the exchange command or via a dialogue option."
string = ItemsHelper_4,"This weapon has a mystical connection with its owner. In his hands, the damage of this blade is increased by "
string = ItemsHelper_5,"Double-clicking or Enter on the table rows opens the item exchange form "
string = ItemsHelper_6,"Shift + left/right on the table rows automatically opens a form with a preset purchase/sale quantity to the maximum. "
string = ItemsHelper_7,"Entering a plus amount from the keyboard sets the item to be taken away, and a minus amount sets up the return."
string = ItemsHelper_8,"Left/right arrows change the quantity one by one, and Shift + left/right to the maximum available. Pressing Enter on a form is equivalent to OK, and Esc is Cancel."
string = ItemsHelper_9,"While in form mode and scrolling the list in the table with the up/down arrows, you can view the description of the item under the table cursor."
