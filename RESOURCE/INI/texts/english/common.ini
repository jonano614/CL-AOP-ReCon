string = TradeInterfaceTitle,"Trading interface"
string = TradeInterfaceDescr_1,"Double-clicking or Enter on the table rows calls up the goods purchase/sale form."
string = TradeInterfaceDescr_2,"Shift + left/right on the table rows automatically calls up the form with the preset purchase/sale quantity to the maximum."
string = TradeInterfaceDescr_3,"Entering a plus quantity from the keyboard sets the purchase of the goods, and a minus quantity sets the sale."
string = TradeInterfaceDescr_4,"Left/right arrows change the quantity by packs, and Shift + left/right to the maximum available. Pressing Enter on the form is equivalent to OK, and Esc is Cancel."
string = TradeInterfaceDescr_5,"While in the form mode and scrolling the list in the table with the up/down arrows, you can view the description of the goods under the table cursor."
string = TradeInterfaceDescr_6,"Quick sale of everything: up/down arrows on the list, Shift + right, Enter"
string = TradeInterfaceDescr_7,"Colour differentiation of goods"
string = TradeInterfaceDescr_8,"With a trade assistant"
string = TradeInterfaceDescr_9,"Quickly take everything: up/down arrows in the list, Shift + right, Enter."
string = TradeInterfaceDescr_10,"The list for sale does not contain any items equipped by the character."
string = TradeInterfaceDescr_11,"Double-clicking or Enter on the table rows brings up the item purchase/sale form. "
string = TradeInterfaceDescr_12,"Shift + left/right on table rows automatically opens a form with preset buy/sell quantity to maximum. "
string = TradeInterfaceDescr_13,"Entering a plus quantity from the keyboard sets the purchase of the item, and a minus quantity (with a minus sign) sets the sale."
string = TradeInterfaceDescr_14,"While in form mode and scrolling the list in the table with the up/down arrows, you can view the description of the item under the table cursor."
string = TradeInterfaceDescr_15,"in the cabin"
string = CannonsTradeInterfaceDescr_1,"cannons can be installed on the ship"
string = CannonsTradeInterfaceDescr_2,"cannons cannot be installed on a ship"
string = CannonsTradeInterfaceDescr_3,"cannons already installed on the ship"

string = AlchemyInterfaceDescr_1,"To craft items, select an item from the list of available recipes at the top, then use the arrows at the bottom to set the desired quantity.\n"
string = AlchemyInterfaceDescr_2,"Then press the 'Create' button (it will become active once the quantity of components matches the recipe requirements).\n\nEquipped items are not shown in the list of available components."
string = AlchemyInterfaceDescr_3,"While in your cabin, all components and tools stored in chests will be available—there is no need to move them to your inventory.\n\n"
string = AlchemyInterfaceDescr_4,"Right-click to dismiss this message."

