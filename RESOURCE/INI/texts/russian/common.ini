string = GameMenuHelper_1, "Стартовые условия и помощь"
string = GameMenuHelper_2, "Анимация персонажа: "
string = GameMenuHelper_3, "\nВажно:\nЕсли персонаж после патча перестал двигаться, то зайдите в настройки игры и нажмите 'По умолчанию' и затем 'Принять'.\nПри низком FPS уменьшите разрешение или поменяйте параметр msaa с 16 на 2 в лаунчере.\nРекомендуем не ставить большой FPS в engine.ini (оптимально 60-100) или включить вертикальную синхронизацию лаунчере игры.\nНовую игру начинайте желательно с новым именем профиля!\nОбратная связь:\nМожете написать обратную связь в "Steam Сообществе".\nОказать более качественную и быструю поддержку в режиме онлайн возможно только в Discrod сервере.\nУспехов и приятной игры!"
string = GameMenuHelper_4, "В профиле "
