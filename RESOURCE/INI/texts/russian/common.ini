string = ItemsColonTitle, "Наименование предметов"
string = ItemsHelper_1, "В этом интерфейсе вы можете просмотреть и назначить герою саблю, пистолет, подзорную трубу и кирасу. "
string = ItemsHelper_2, "Так же можно посмотреть состояние инвентаря офицеров, компаньонов и пассажиров. Выбор экипировки они делают автоматически, когда вы отдадите новые предметы. "
string = ItemsHelper_3, "Обмен предметами со своими офицерами осуществляется на суше через команду обмен или через диалог."
string = ItemsHelper_4, "Это оружие мистически связано с владельцем. В его руках урон увеличен на "
string = ItemsHelper_5, "Двойной клик мыши или Enter по строкам таблицы вызывает форму обмена предметами "
string = ItemsHelper_6, "Shift + лево/право на строках таблицы автоматически вызывают форму с предустановленным количеством покупки/продажи на максимальное. "
string = ItemsHelper_7, "Ввод положительного количества с клавиатуры устанавливает забирание предмета, а отрицательного (с минусом) отдачу."
string = ItemsHelper_8, "Стрелки лево/право изменяют количество по одному, а Shift + лево/право на максимально доступное. Нажатие Enter на форме равносильно ОК, а Esc - Отмена."
string = ItemsHelper_9, "Находясь в режиме формы и мотая список в таблице стрелкам вверх/вниз, можно просматривать описание предмета под курсором таблицы."
string = ItemsHelper_10, "В списке на обмен отсутствуют экипированные персонажем предметы."
string = ItemsHelper_11, "Быстрая отдача всего: стрелками вверх/вниз по списку, Shift + право, Enter"
