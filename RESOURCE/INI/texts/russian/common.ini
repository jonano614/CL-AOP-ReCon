string = TradeInterfaceDescr_4, "Стрелки лево/право изменяют количество по пачкам, а Shift + лево/право на максимально доступное. Нажатие Enter на форме равносильно ОК, а Esc - Отмена."
string = TradeInterfaceDescr_5, "Находясь в режиме формы и мотая список в таблице стрелкам вверх/вниз, можно просматривать описание товара под курсором таблицы."
string = TradeInterfaceDescr_6, "Быстрая продажа всего: стрелками вверх/вниз по списку, Shift + право, Enter"
string = TradeInterfaceDescr_7, "Цветовая дифференциация товара"
string = TradeInterfaceDescr_8, "С торговым ассистентом"
