string = ChatacterInderfaceDescr_1, "Способность будет работать и в том случае, если назначен офицер "
string = ChatacterInderfaceDescr_2, ", у которого она есть."
string = ChatacterInderfaceDescr_3, "Эта способность не требует траты очков"
string = ChatacterInderfaceDescr_4, "Создать своего героя"
string = ChatacterInderfaceDescr_5, "Для изменения характеристики героя нажмите на неё и стрелками перераспределите очки.\nУмения автоматически пересчитаются от выбранных P.I.R.A.T.E.S.\n\nЗакройте форму крестиком или Esc, когда распределение будет завершено."
string = ChatacterInderfaceDescr_6, "Увеличить характеристики"
string = ChatacterInderfaceDescr_7, "Для увеличения характеристики выберите её и добавьте очки с помощью стрелки. Обратите внимание, что перераспределить характеристики нельзя - можно только потратить доступные очки. Закройте форму крестиком или Esc, когда распределение будет завершено. Если прервать ритуал, не распределив все очки, то оставшиеся очки пропадут!"
string = ChatacterInderfaceDescr_8, "Клик по списку - назначение или съём офицера."
string = ChatacterInderfaceDescr_9, "При отсутствии НЗГ, если во вражеском городе бездействовать, стоя на месте, или миновать постовых и патрульных солдат шагом, то есть вероятность избежать лишнего внимания."
string = ChatacterInderfaceDescr_10, "\n\nЕсли Скрытность и/или Везение полностью прокачаны, то у вещей с бонусом к этим умениям появляется вторая жизнь:\n+10% (-10% при штрафе) от значения к шансу.\n\nНочью базовый шанс вдвое меньше.\n\nЭкстра-бонусы (не подвержены штрафам ночью):\nГадание цыганки за 5000 дарует +5% на 7 дней\nПерк 'Искусство обмана' даёт +5%\n\nФормула:\n'I' + 'S' + (('Скрытность' / 3) + ('Везение' / 4)) + бонусы\штрафы от предметов + экстра-бонусы\n"
string = ChatacterInderfaceDescr_11, "Шанс скрытности при передвижении шагом рядом с солдатами: "
