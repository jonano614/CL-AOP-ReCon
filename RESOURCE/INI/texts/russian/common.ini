string = TradeInterfaceDescr_1, "Двойной клик мыши или Enter по строкам таблицы вызывает форму покупки/продажи товара. "
string = TradeInterfaceDescr_2, "Shift + лево/право на строках таблицы автоматически вызывают форму с предустановленным количеством покупки/продажи на максимальное. "
