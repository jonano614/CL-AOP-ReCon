string = MessageCrewCheckbox_1, "При выборе варианта 'до максимальной' в случае помещения корабля на хранение оставшаяся на нём команда распределяется по всем остальным кораблям поочерёдно, начиная с флагмана. При этом команда заполняется до перегруза. Навыки и мораль команды при этом перерассчитываются."
string = OptCrewSend, "до оптимальной"
string = OptCrewSend_descr, "Вся команда с этого судна распределится в вашу эскадру до оптимальных значений без перегруза, начиная с флагмана."
string = MessageCrewCheckbox_2, "При выборе варианта 'до оптимальной' в случае помещения корабля на хранение оставшаяся на нём команда распределяется по всем остальным кораблям поочерёдно, начиная с флагмана. При этом команда заполняется до оптимальной, без перегруза. Навыки и мораль команды при этом перерассчитываются."
string = FireEveryone, "списать на берег"
string = FireEveryone_descr, "Вся команда с этого судна будет списана на берег в таверну, ожидая там дальнейшего найма."
string = MessageCrewCheckbox_3, "При выборе варианта 'списать на берег' в случае помещения корабля на хранение оставшаяся на нём команда отправляется в таверну, сливаясь по умениям с уже наличествующими там претендентами в команду."
string = MessageGoodCheckbox_4, "Распределение товаров"
string = GoodsToShip, "погрузить на флагман"
string = GoodsToShip_descr, "Все товары будут перегружены на флагман, без учёта перегруза."
string = MessageGoodCheckbox_2, "При выборе варианта 'погрузить на флагман' в случае помещения корабля все товары будут перегружены на флагман, без учёта перегруза."
string = GoodsToStore, "продать в магазин"
string = GoodsToStore_descr, "Все товары будут проданы по ценам текущей колонии. Контрабанда погружена на флагман, без учёта перегруза. Если на стоянку отправляется флагман, то контрабанда будет уничтожена."
string = MessageGoodCheckbox_1, "При выборе варианта 'продать в магазин' в случае помещения корабля на хранение все товары будут проданы по ценам текущей колонии, контрабанда погружена на флагман. Без учёта перегруза. Если на стоянку отправляется флагман, то контрабанда будет уничтожена."
string = GoodsToWarehouse, "сгрузить в пакгауз"
string = GoodsToWarehouse_descr, "Все товары будут перемещены на хранение в пакгауз, если он доступен."
string = MessageGoodCheckbox_3, "При выборе варианта 'сгрузить в пакгауз' в случае помещения корабля на хранение все товары будут перемещены на пакгауз."
