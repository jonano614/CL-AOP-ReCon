string = QuestsBook, "Journal des quêtes"
string = QuestsBook_Descr, "Affiche la liste des quêtes en cours, des événements de l’histoire et des actions du personnage principal. Dans la liste chronologique des événements thématiques, chaque nouvelle entrée est datée et placée au-dessus des précédentes. Les entrées non lues sont mises en couleur."
string = QuestsLogBook, "Archive des quêtes"
string = QuestsLogBook_Descr, "Affiche la liste des quêtes terminées, des missions et des aventures scénarisées achevées."
string = DocsBook, "Documents"
string = DocsBook_Descr, "Vous trouverez ici divers documents reçus par le personnage principal au cours du jeu (manuscrits et fragments, lettres et simples notes, instructions et toutes sortes de recettes). Pensez à consulter régulièrement les documents de cette section : ils peuvent contenir des indices ou mentionner des événements importants du passé récent. Les documents non lus sont mis en évidence par une couleur."
string = CashBook, "Livre de caisse"
string = CashBook_Descr1, "Ici sont affichés les registres de toutes les opérations financières du personnage principal, les prêts qu’il a reçus (liste à gauche) ou accordés (liste à droite). Outre le montant du prêt ou du dépôt à la banque, les registres contiennent des informations complémentaires (taux d’intérêt, dates, échéances et type de devise)."
string = CashBook_Descr2, "Important ! Si la ville où l’usurier a reçu un dépôt est pillée, le dépôt disparaît et son enregistrement est supprimé du livre."
string = ShipsPlaceBook, "Navires à l’Autorité portuaire"
string = ShipsPlaceBook_Descr1, "Ici, vous pouvez voir les navires actuellement à la disposition du protagoniste et placés en réserve. La liste fournit des informations sur chaque bâtiment (classe, nom du navire, nom du capitaine, emplacement de l’emplacement loué, date de dépôt et tarif mensuel de stockage)."
string = ShipsPlaceBook_Descr2, "Appuyez sur SHIFT + clic gauche pour afficher les informations du navire"
string = ShipsPlaceBook_Descr3, "Appuyez sur CTRL + Clic gauche pour obtenir des informations sur le capitaine"
string = StorageBook, "Livre d’inventaire"
string = StorageBook_Descr, "Les registres des entrepôts ou magasins loués sont affichés ici (leur emplacement, l’espace utilisé et disponible, le loyer mensuel)."
string = TradeBook, "Livre de commerce"
string = TradeBook_Descr1, "Cette liste indique la nationalité et le nom de la colonie, son emplacement, ainsi que la date à laquelle l’état des stocks et les prix ont été relevés dans le tableau de droite. La liste est mise à jour chaque fois que le héros obtient de nouvelles informations commerciales. Avec le temps, ces données deviennent obsolètes, car le commerce évolue de façon autonome dans le jeu, mais elles permettent de tirer les principales conclusions. Au début de la partie, la liste est vide. Pour actualiser les enregistrements de façon aussi complète et rapide que possible, profitez de chaque occasion pour découvrir les prix des marchandises dans les colonies lointaines auprès des marchands en mer ou dans les tavernes, ainsi qu’à travers les rumeurs."
string = TradeBook_Descr2, "La liste des marchandises est assez vaste : certaines sont produites ou cultivées uniquement sur les îles, d’autres sur le continent, et quelques-unes sont importées de lointaine Europe. Les marchandises exportées par la colonie ne sont pas chères, mais celles importées, bien sûr, le sont. Si la demande pour une marchandise est forte et que la quantité est faible, elle devient de la contrebande – elle n’est alors plus vendue dans les magasins. Certains biens dangereux (par exemple, les armes et la poudre à canon) peuvent même être interdits à la vente officielle par décision des autorités locales."
string = TradeBook_Descr3, "Couleurs d’indicateur de type de produit: \n- Vert: marchandises coloniales\n- Bleu: marchandises importées\n- Rouge: marchandises de contrebande\n- Pêche: marchandises à demande agressive"
string = StatisticsBook, "Livre de statistiques"
string = StatisticsBook_Descr, "Les résumés des événements de jeu (nombre d’adversaires vaincus, prix remportés, argent dépensé, etc.) sont affichés ici."
