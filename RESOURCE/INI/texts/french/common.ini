string = GameMenuHelper_1, "Conditions de départ et aide"
string = GameMenuHelper_2, "Animation du personnage: "
string = GameMenuHelper_3, "\nImportant :\nSi votre personnage ne bouge plus après le patch, allez dans les paramètres du jeu, cliquez sur 'Par défaut' puis sur 'Appliquer'.\nEn cas de faible FPS, réduisez la résolution ou changez le paramètre MSAA de 16 à 2 dans le lanceur.\nNous recommandons de ne pas définir un FPS trop élevé dans engine.ini (60-100 est optimal) ou d'activer la synchronisation verticale dans le lanceur.\nIl est conseillé de commencer une nouvelle partie avec un nouveau nom de profil !\nCommentaires :\nVous pouvez laisser vos commentaires dans la 'Communauté Steam'.\nUn support en ligne plus rapide et de meilleure qualité n'est possible que sur notre serveur Discord.\nBonne chance et bon jeu !"
