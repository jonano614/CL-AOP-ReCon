string = Leadership_Descr, "Le Leadership indique l’influence que vous exercez sur votre entourage et votre capacité à atteindre vos objectifs."
string = Sailing_Descr, "La Navigation reflète votre capacité à diriger votre navire et influence sa vitesse et sa manœuvrabilité."
string = Fencing_Descr, "L’escrime est essentielle pour tout capitaine, car votre survie dépendra souvent de votre habileté à manier la lame."
string = Gun_Descr, "Un tir bien placé, éliminant un ou plusieurs ennemis, peut vous sauver la vie."
string = Cannons_Descr, "Cette compétence influence le temps de rechargement de vos canons et la précision de leur tir."
string = Accuracy_Descr, "Cette compétence reflète votre capacité à tirer une salve de canons avec précision."
string = Grappling_Descr, "Cette compétence reflète votre capacité à choisir le meilleur emplacement, la bonne distance et le moment opportun pour l’abordage, ainsi que l’aptitude de votre équipage à combattre jusqu’à la victoire."
string = Defence_Descr, "Des quartiers d’équipage confortables, une bonne hygiène et des soins aux blessés augmentent le nombre de survivants après de rudes batailles et de longs voyages."
string = Repair_Descr, "Une bonne connaissance de votre navire et de sa construction permet d’utiliser l’équipe de réparation plus efficacement."
string = Commerce_Descr, "Votre talent pour marchander, évaluer la qualité des marchandises d’un simple regard et vos nombreux contacts vous permettent de conclure des affaires bien plus avantageuses."
string = Sneak_Descr, "Chance, prévoyance, instinct du danger ou flair pour les bonnes affaires : plus vous développez cette compétence, plus la chance vous sourit."
string = Navigator_Descr, "La capacité à manœuvrer le navire aussi bien par mer d’huile qu’en pleine tempête est essentielle pour un capitaine, et c’est le navigateur qui l’assiste dans cette tâche. En plein combat, il peut être celui qui, d’un geste au dernier instant, sauve le navire d’une salve ennemie."
string = Boatswain_Descr, "On dit que les boscos sont nés sur leur navire. Leur maîtrise de leur métier et des moindres détails de la vie en mer est inégalée. Un bon bosco sait tirer le meilleur parti de son navire, motiver l’équipage avant la bataille et remettre le navire à flot."
string = Cannoner_Descr, "Un canonnier expérimenté peut changer le cours d’un combat naval en un instant. Son savoir-faire permet aux canons du navire de tirer avec plus de précision. Il veille aussi à ce que les canons restent secs et prêts à l’action."
string = Doctor_Descr, "Le chirurgien de bord soigne ceux qui ont été blessés au combat. Il doit savoir amputer des membres, suturer des plaies, prévenir les épidémies et prodiguer d’autres soins médicaux à l’équipage. Un bon chirurgien peut sauver la vie de nombreux membres de votre équipage."
string = Treasurer_Descr, "Le purser gère la cale et toutes les marchandises à bord. De plus, un trésorier est toujours un négociant expérimenté, capable d’aider le capitaine à acheter à bas prix et à négocier de bonnes affaires."
string = Carpenter_Descr, "Un bon charpentier peut réparer les dégâts causés au navire par les tempêtes ou les tirs ennemis. Le plus souvent, il commence les réparations juste après la bataille. Un charpentier expérimenté sait exactement ce qu’il faut réparer en priorité pour que le navire reste à flot."
string = Officer_Descr, "La vie est pleine de dangers et de surprises. Des bandits peuvent vous attendre dans une ruelle sombre, et lors d’un abordage, une balle perdue peut vous atteindre. C’est pourquoi il vous faut un Combattant – un homme qui fait office de garde du corps."
