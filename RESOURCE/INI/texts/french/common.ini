string = ChatacterInderfaceDescr_1, "Fonctionne aussi si un officier est assigné "
string = ChatacterInderfaceDescr_2, ", qui possède cet avantage."
string = ChatacterInderfaceDescr_3, "Cet avantage ne coûte aucun point."
string = ChatacterInderfaceDescr_4, "Créez votre propre héros"
string = ChatacterInderfaceDescr_5, "Pour modifier les attributs du héros, cliquez dessus puis utilisez les flèches pour répartir les points.\nLes compétences seront automatiquement recalculées à partir des P.I.R.A.T.E.S. sélectionnés.\n\nFermez le formulaire avec la croix ou la touche Échap une fois la répartition terminée."
string = ChatacterInderfaceDescr_6, "Augmenter les caractéristiques"
string = ChatacterInderfaceDescr_7, "Pour augmenter les capacités du héros, sélectionnez-en une et ajoutez des points à l’aide des flèches. Attention, il n’est pas possible de redistribuer les capacités : vous ne pouvez utiliser que les points disponibles. Fermez le formulaire avec la croix ou la touche Échap une fois la répartition terminée. Si vous interrompez le rituel sans avoir distribué tous les points, les points restants seront perdus !"
string = ChatacterInderfaceDescr_8, "Cliquez sur la liste pour nommer ou suspendre un officier."
string = ChatacterInderfaceDescr_9, "En l'absence de prime sur votre tête, si vous restez immobile dans une ville ennemie ou passez devant les soldats sans rien faire, vous avez une chance de rester incognito."
string = ChatacterInderfaceDescr_10, "\nSi Furtivité et/ou Chance sont au maximum, les objets offrant un bonus à ces compétences bénéficient d’une seconde vie :\n+10 % (-10 % en cas de malus) de la valeur ajoutés à la chance.\n\nLa nuit, la chance de base est réduite de moitié.\n\nBonus supplémentaires (non affectés par les malus nocturnes) :\nUne voyance gitane pour 5000 accorde +5 % pendant 7 jours\nLe talent « Art de la tromperie » donne +5 %\n\nFormule :\n'I' + 'S' + ((« Furtivité » / 3) + (« Chance » / 4)) + bonus/malus des objets + bonus supplémentaires\n"
string = ChatacterInderfaceDescr_11, "Chance de furtivité en marchant au lieu de courir près des soldats: "
