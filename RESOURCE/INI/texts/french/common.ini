string = ItemsTradeInfo, "Seuls les objets non équipés sont comptabilisés dans le nombre d’objets de votre personnage."
string = ItemsColonTitle, "Nom de l’objet"
string = ItemsHelper_1, "Dans cette interface, vous pouvez consulter et équiper le personnage d’un sabre, d’un pistolet, d’une longue-vue et d’une cuirasse. "
string = ItemsHelper_2, "Vous pouvez également consulter l’inventaire des officiers, compagnons et passagers. Ils choisissent automatiquement leur équipement lorsque vous leur donnez de nouveaux objets. "
string = ItemsHelper_3, "L’échange d’objets avec vos officiers se fait à terre, via la commande d’échange ou une option de dialogue."
string = ItemsHelper_4, "Cette arme est mystiquement liée à son propriétaire. Entre ses mains, les dégâts de cette lame sont augmentés de "
string = ItemsHelper_5, "Un double-clic ou Entrée sur les lignes du tableau ouvre le formulaire d’échange d’objets "
string = ItemsHelper_6, "Shift + gauche/droite sur les lignes du tableau ouvre automatiquement un formulaire avec la quantité d'achat/vente prédéfinie au maximum. "
string = ItemsHelper_7, "Saisir une quantité positive au clavier indique un retrait de l’objet, tandis qu’une quantité négative indique un retour."
string = ItemsHelper_8, "Les flèches gauche/droite modifient la quantité une par une, et Shift + gauche/droite jusqu’au maximum disponible. Appuyer sur Entrée dans un formulaire équivaut à OK, et Échap à Annuler."
string = ItemsHelper_9, "En mode formulaire, en faisant défiler la liste du tableau avec les flèches haut/bas, vous pouvez afficher la description de l’élément sous le curseur du tableau."
string = ItemsHelper_10, "La liste d’échange n’inclut pas les objets déjà équipés par les personnages."
string = ItemsHelper_11, "Retour rapide de tout : flèches haut/bas dans la liste, Maj + droite, Entrée"
