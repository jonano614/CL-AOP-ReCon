string = MessageCrewCheckbox_4, "Réaffectation de l’équipage"
string = MaxCrewSend, "jusqu’au maximum"
string = MaxCrewSend_descr, "Tout l’équipage de ce navire sera réparti dans votre escadre jusqu’aux valeurs maximales, en tenant compte de la surcharge, en commençant par le navire amiral."
string = MessageCrewCheckbox_1, "En choisissant l’option « jusqu’au maximum », tout l’équipage de ce navire sera réparti dans votre escadre jusqu’aux valeurs maximales, en tenant compte de la surcharge, en commençant par le navire amiral. Dans ce cas, l’équipage est rempli jusqu’à la surcharge. Les compétences et le moral de l’équipage sont alors recalculés."
string = OptCrewSend, "à un niveau optimal"
string = OptCrewSend_descr, "Tout l’équipage de ce navire sera réparti dans votre escadre jusqu’aux effectifs optimaux sans surcharge, en commençant par le vaisseau amiral."
string = MessageCrewCheckbox_2, "En choisissant l’option « vers l’optimal », tout l’équipage de ce navire sera réparti entre les navires de votre escadre jusqu’aux valeurs optimales, sans surcharge, en commençant par le vaisseau amiral. Les compétences et le moral de l’équipage seront alors recalculés."
string = FireEveryone, "débarqué à terre"
string = FireEveryone_descr, "Tout l’équipage de ce navire sera débarqué à la taverne à terre, en attendant un prochain recrutement."
string = MessageCrewCheckbox_3, "En choisissant l’option « débarquer à terre », tout l’équipage de ce navire sera envoyé à la taverne à terre, fusionnant ses compétences avec celles des candidats déjà présents à la taverne."
string = MessageGoodCheckbox_4, "Redistribution des marchandises"
string = GoodsToShip, "charger sur le navire amiral"
string = GoodsToShip_descr, "Toutes les marchandises seront transférées sur le navire amiral, sans tenir compte de la surcharge du navire."
string = MessageGoodCheckbox_2, "En choisissant l’option « charger sur le vaisseau amiral », toutes les marchandises seront transférées sur le vaisseau amiral, sans tenir compte de la surcharge du navire."
string = GoodsToStore, "vendre au magasin"
string = GoodsToStore_descr, "Toutes les marchandises seront vendues aux prix actuels de la colonie. La contrebande est chargée sur le navire amiral, sans tenir compte de la surcharge. Si le navire amiral est amarré au chantier naval, la contrebande sera détruite."
string = MessageGoodCheckbox_1, "En choisissant l’option « vendre au magasin », toutes les marchandises seront vendues aux prix de la colonie actuelle. La contrebande sera transférée sur le navire amiral, sans tenir compte de la surcharge. Si le navire amiral est amarré au chantier naval, la contrebande sera détruite."
string = GoodsToWarehouse, "décharger dans l’entrepôt"
string = GoodsToWarehouse_descr, "Toutes les marchandises seront stockées dans l’entrepôt si disponible."
string = MessageGoodCheckbox_3, "En choisissant l’option « décharger dans l’entrepôt », toutes les marchandises seront transférées à l’entrepôt pour stockage si disponible."
