string = TradeInterfaceTitle, "Interface de commerce"
string = TradeInterfaceDescr_1, "Un double-clic ou Entrée sur les lignes du tableau ouvre le formulaire d'achat/vente de marchandises. "
string = TradeInterfaceDescr_2, "Shift + gauche/droite sur les lignes du tableau ouvre automatiquement le formulaire avec la quantité d'achat/vente réglée au maximum. "
string = TradeInterfaceDescr_3, "Saisir une quantité positive au clavier indique un achat, une quantité négative indique une vente."
string = TradeInterfaceDescr_4, "Les flèches gauche/droite modifient la quantité par lots, et Shift + gauche/droite règle sur le maximum disponible. Appuyer sur Entrée dans le formulaire équivaut à OK, et Échap à Annuler."
string = TradeInterfaceDescr_5, "En mode formulaire, en faisant défiler la liste du tableau avec les flèches haut/bas, vous pouvez afficher la description de la marchandise sous le curseur du tableau."
string = TradeInterfaceDescr_6, "Vente rapide de tout : flèches haut/bas dans la liste, Shift + droite, Entrée"
string = TradeInterfaceDescr_7, "Différenciation des marchandises par couleur"
string = TradeInterfaceDescr_8, "Avec un assistant commercial"
string = TradeInterfaceDescr_9, "Prendre tout rapidement : flèches haut/bas dans la liste, Shift + droite, Entrée."
string = TradeInterfaceDescr_10, "La liste de vente ne contient aucun objet équipé par le personnage."
string = TradeInterfaceDescr_11, "Un double-clic ou Entrée sur une ligne du tableau ouvre le formulaire d'achat/vente d'objet. "
string = TradeInterfaceDescr_12, "Shift + gauche/droite sur les lignes du tableau ouvre automatiquement un formulaire avec la quantité d'achat/vente réglée au maximum. "
string = TradeInterfaceDescr_13, "Saisir une quantité positive au clavier indique un achat de l’objet, tandis qu’une quantité négative (avec un signe moins) indique une vente."
string = TradeInterfaceDescr_14, "En mode formulaire, lorsque vous faites défiler la liste du tableau avec les flèches haut/bas, vous pouvez afficher la description de l’élément sous le curseur du tableau."
string = TradeInterfaceDescr_15, "dans la cabine"
string = CannonsTradeInterfaceDescr_1, "des canons peuvent être installés sur le navire"
string = CannonsTradeInterfaceDescr_2, "les canons ne peuvent pas être installés sur un navire"
string = CannonsTradeInterfaceDescr_3, "canons déjà installés sur le navire"
string = AlchemyInterfaceDescr_1, "Pour fabriquer des objets, sélectionnez un objet dans la liste des recettes disponibles en haut, puis utilisez les flèches en bas pour définir la quantité souhaitée.\n"
string = AlchemyInterfaceDescr_2, "Appuyez ensuite sur le bouton « Créer » (il sera actif lorsque la quantité de composants correspondra aux exigences de la recette).\n\nLes objets équipés ne figurent pas dans la liste des composants disponibles."
string = AlchemyInterfaceDescr_3, "Lorsque vous êtes dans votre cabine, tous les composants et outils stockés dans les coffres seront accessibles—il n’est pas nécessaire de les transférer dans votre inventaire.\n\n"
string = AlchemyInterfaceDescr_4, "Cliquez avec le bouton droit pour fermer ce message."
