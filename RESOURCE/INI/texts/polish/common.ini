string = Leadership_Descr, "Dowodzenie określa, jak duży masz wpływ na otaczających cię ludzi i jak skutecznie potrafisz osiągać swoje cele."
string = Sailing_Descr, "Nawigacja określa, jak dobrze potrafisz prowadzić swój statek i wpływa na jego prędkość oraz manewrowość."
string = Fencing_Descr, "Szermierka jest ważna dla każdego kapitana, bo często to właśnie od twojej wprawy w walce zależy twoje przetrwanie."
string = Gun_Descr, "Celny strzał, który zabije jednego lub kilku wrogów, może uratować ci życie."
string = Cannons_Descr, "Ta umiejętność wpływa na czas przeładowania dział oraz skupienie ognia."
string = Accuracy_Descr, "Ta umiejętność określa, jak dobrze potrafisz celnie oddać salwę z dział."
string = Grappling_Descr, "Umiejętność wyboru najlepszego miejsca, dystansu i momentu do abordażu, a także zdolność twojej załogi do wspólnej walki o zwycięstwo."
string = Defence_Descr, "Wygodne kajuty, higiena i leczenie rannych zwiększają liczbę ocalałych po ciężkich bitwach i długich rejsach."
string = Repair_Descr, "Dobra znajomość statku i jego budowy pozwala skuteczniej wykorzystać załogę naprawczą."
string = Commerce_Descr, "Umiejętność targowania się, oceny jakości towaru na pierwszy rzut oka oraz szerokie kontakty pozwalają ci prowadzić handel z większą korzyścią dla siebie."
string = Sneak_Descr, "Szczęście, przewidywanie, wyczucie zagrożenia lub łatwego zysku – im bardziej rozwijasz tę umiejętność, tym większe masz szczęście."
string = Navigator_Descr, "Umiejętność skutecznego prowadzenia statku zarówno przy bezwietrznej pogodzie, jak i podczas gwałtownej burzy jest kluczowa dla kapitana, a nawigator to człowiek, który mu w tym pomoże. W ogniu walki to on może w ostatniej chwili obrócić ster, ratując okręt przed salwą wroga."
string = Boatswain_Descr, "Mówią, że bosmani rodzą się na swoich statkach. Ich znajomość rzemiosła i codziennych spraw życia na morzu nie ma sobie równych. Dobry bosman wie, jak wydobyć ze statku wszystko, co się da, jak natchnąć załogę przed bitwą i jak ponownie ruszyć na pełne morze."
string = Cannoner_Descr, "Zdolny kanonier potrafi błyskawicznie odmienić losy bitwy morskiej. Jego doświadczenie i umiejętności pozwalają na celniejsze strzały z dział okrętowych. Kanonier dba też o to, by działa były zawsze suche i gotowe do walki."
string = Doctor_Descr, "Lekarz okrętowy opiekuje się tymi, którzy ucierpieli w walce. Musi umieć amputować kończyny, zszywać rany, zapobiegać epidemiom i udzielać innej pomocy medycznej załodze. Dobry lekarz potrafi ocalić życie wielu twoich ludzi."
string = Treasurer_Descr, "Kwatermistrz zarządza ładownią i wszystkimi towarami na pokładzie. Poza tym to doświadczony handlarz, który potrafi pomóc kapitanowi kupować taniej i negocjować korzystne ceny."
string = Carpenter_Descr, "Dobry cieśla potrafi naprawić uszkodzenia statku spowodowane przez sztormy lub ostrzał wroga. Najczęściej zabiera się do pracy zaraz po zakończeniu bitwy. Doświadczony cieśla wie, co trzeba załatać w pierwszej kolejności, by okręt nie poszedł na dno."
string = Officer_Descr, "Życie pełne jest niebezpieczeństw i niespodzianek. W ciemnej uliczce mogą czyhać na ciebie rabusie, a podczas abordażu może cię dosięgnąć zabłąkana kula. Dlatego właśnie potrzebujesz Gwardzisty – człowieka, który jest twoim ochroniarzem."
