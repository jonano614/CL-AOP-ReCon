string = Surrendered_caption_1, "Wynik abordażu"
string = Surrendered_caption_2, "Decyzja dotycząca jeńców"
string = Surrendered_crew, "Wróg postanowił poddać się na twoją łaskę bez walki."
string = Surrendered_captain, "Zrozumiawszy, że opór jest daremny, kapitan i reszta załogi zdali się na twoją łaskę."
string = Surrendered_text_1, "Nie można przenosić załogi między statkami, które nie należą do ciebie. Aby przejąć statek, musisz usunąć jego kapitana i wyznaczyć własnego."
string = Surrendered_text_2, "Usunięcie kapitana z poddanego statku uniemożliwi ci wypuszczenie go po splądrowaniu. Kontynuować?"
string = Surrendered_exit_1, "Statek został bez kapitana. Zatopić go?"
string = Surrendered_exit_2, "Skończyć grabież i uwolnić poddanego kapitana wraz z załogą? Obiecali, że już do nas nie strzelą."
string = Surrendered_captain_capture, "Wybierz los poddanego kapitana."
string = Surrendered_captain_capture_1, "Wyrzuć za burtę"
string = Surrendered_captain_capture_2, "Weź do niewoli"
string = Surrendered_crew_capture, "Wybierz los poddanych marynarzy."
string = Surrendered_crew_capture_1, "Wyrzuć wszystkich za burtę"
string = Surrendered_crew_capture_2, "Zamień każdego z nich w niewolnika"
string = Surrendered_crew_capture_3, "Wypuść ich na szalupach"
string = Surrendered_wishes, "Część załogi wroga chce do ciebie dołączyć."
string = Pay_for_ship, "Utrzymanie statku:"
string = Max_crew_text1, "Załoga może przekroczyć maksymalną liczbę, ale powoduje to przeciążenie i fatalne warunki życia na statku, co prowadzi do codziennego spadku morale. Średnio można zabrać na pokład do 25% więcej marynarzy."
string = Max_crew_text2, "Maksymalna liczba załogi z przeciążeniem:"
string = Caliber_text1, "Podwójne kliknięcie lub naciśnięcie Enter na tym polu wyświetli działa zamontowane na burtach."
string = HoldWeight, "Waga w ładowni"
string = QuantityWeight, "Ilość w ładowni"
string = CannonsInHold, "Działa w ładowni"
string = Captain_remove, "Zastąpić kapitana?"
