string = TradeInterfaceTitle, "Interfejs handlu"
string = TradeInterfaceDescr_1, "Podwójne kliknięcie lub Enter na wierszu tabeli otwiera formularz kupna/sprzedaży towaru. "
string = TradeInterfaceDescr_2, "Shift + lewo/prawo na wierszach tabeli automatycznie otwiera formularz z maksymalną ilością zakupu/sprzedaży. "
string = TradeInterfaceDescr_3, "Wprowadzenie dodatniej liczby z klawiatury ustawia zakup towaru, a ujemnej — sprzedaż."
string = TradeInterfaceDescr_4, "Strzałki w lewo/prawo zmieniają ilość o paczki, a Shift + lewo/prawo do maksymalnej dostępnej. Naciśnięcie Enter na formularzu jest równoznaczne z OK, a Esc z Anuluj."
string = TradeInterfaceDescr_5, "Będąc w trybie formularza i przewijając listę w tabeli za pomocą strzałek góra/dół, możesz wyświetlić opis towaru pod kursorem tabeli."
string = TradeInterfaceDescr_6, "Szybka sprzedaż wszystkiego: strzałki góra/dół na liście, Shift + w prawo, Enter"
string = TradeInterfaceDescr_7, "Różnicowanie kolorystyczne towarów"
string = TradeInterfaceDescr_8, "Z asystentem handlowym"
string = TradeInterfaceDescr_9, "Szybkie zabranie wszystkiego: strzałki góra/dół na liście, Shift + w prawo, Enter."
string = TradeInterfaceDescr_10, "Na liście sprzedaży nie ma żadnych przedmiotów wyposażonych przez postać."
string = TradeInterfaceDescr_11, "Dwukrotne kliknięcie lub naciśnięcie Enter na wierszu tabeli otwiera formularz kupna/sprzedaży przedmiotu. "
string = TradeInterfaceDescr_12, "Shift + lewo/prawo na wierszach tabeli automatycznie otwiera formularz z ustawioną maksymalną ilością kupna/sprzedaży. "
string = TradeInterfaceDescr_13, "Wprowadzenie dodatniej liczby z klawiatury ustawia zakup przedmiotu, a ujemnej (z minusem) sprzedaż."
string = TradeInterfaceDescr_14, "Będąc w trybie formularza i przewijając listę w tabeli za pomocą strzałek w górę/w dół, możesz zobaczyć opis przedmiotu pod kursorem tabeli."
string = TradeInterfaceDescr_15, "w kajucie"
string = CannonsTradeInterfaceDescr_1, "na statku można zamontować działa"
string = CannonsTradeInterfaceDescr_2, "nie można zamontować dział na statku"
string = CannonsTradeInterfaceDescr_3, "działa już zamontowane na statku"
string = AlchemyInterfaceDescr_1, "Aby wytworzyć przedmioty, wybierz przedmiot z listy dostępnych receptur u góry, a następnie ustaw żądaną ilość za pomocą strzałek na dole.\n"
string = AlchemyInterfaceDescr_2, "Następnie naciśnij przycisk „Utwórz” (będzie aktywny, gdy liczba komponentów będzie zgodna z wymaganiami przepisu).\n\nWyposażone przedmioty nie są wyświetlane na liście dostępnych komponentów."
string = AlchemyInterfaceDescr_3, "Będąc w swojej kajucie, wszystkie komponenty i narzędzia przechowywane w skrzyniach będą dostępne — nie musisz przenosić ich do ekwipunku.\n\n"
string = AlchemyInterfaceDescr_4, "Kliknij prawym przyciskiem myszy, aby zamknąć tę wiadomość."
