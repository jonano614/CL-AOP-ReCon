string = QuestsBook, "Księga zadań"
string = QuestsBook_Descr, "Wyświetlana jest tutaj lista aktualnych zadań, aktywnych wydarzeń fabularnych oraz działań głównego bohatera. W pojawiającej się chronologicznej liście tematycznych wydarzeń każda kolejna notatka oznaczona jest czasem dodania do dziennika i umieszczana powyżej poprzednich. Nieprzeczytane wpisy są wyróżnione kolorem."
string = QuestsLogBook, "Archiwum zadań"
string = QuestsLogBook_Descr, "Wyświetla listę ukończonych zadań, zleceń oraz zakończonych przygód fabularnych."
string = DocsBook, "Dokumenty"
string = DocsBook_Descr, "Wyświetlane są tu różne dokumenty otrzymane przez głównego bohatera w grze (rękopisy i ich fragmenty, listy i zwykłe notatki, instrukcje oraz wszelkiego rodzaju przepisy). Od czasu do czasu warto przejrzeć materiały zgromadzone w tej sekcji – mogą zawierać wskazówki lub wzmianki o ważnych wydarzeniach z niedawnej przeszłości. Nieprzeczytane dokumenty są wyróżnione kolorem."
string = CashBook, "Księga kasowa"
string = CashBook_Descr1, "Tutaj wyświetlane są zapisy dotyczące wszystkich przedsięwzięć finansowych głównego bohatera, otrzymanych przez niego pożyczek (lista po lewej) lub udzielonych przez niego (lista po prawej). Oprócz kwoty pożyczki lub depozytu w domu bankowym, zapisy zawierają dodatkowe informacje (oprocentowanie, daty, terminy oraz rodzaj waluty)."
string = CashBook_Descr2, "Ważne! Jeśli osada, której lichwiarzowi przekazano pieniądze na procent, zostanie splądrowana, depozyt przepada, a wpis zostaje usunięty z księgi."
string = ShipsPlaceBook, "Statki w Zarządzie Portu"
string = ShipsPlaceBook_Descr1, "Tutaj możesz zobaczyć statki obecnie dostępne dla protagonisty, które zostały oddane na przechowanie. Lista zawiera informacje o każdym okręcie (klasa, nazwa statku, imię kapitana, lokalizacja wynajętego miejsca postoju, data oddania do przechowania oraz miesięczna opłata za przechowanie)."
string = ShipsPlaceBook_Descr2, "Naciśnij SHIFT + LPM, aby uzyskać informacje o statku"
string = ShipsPlaceBook_Descr3, "Naciśnij CTRL + LPM, aby uzyskać informacje o kapitanie"
string = StorageBook, "Księga magazynowa"
string = StorageBook_Descr, "Tutaj wyświetlane są zapisy wynajętych magazynów lub pakhausów (ich lokalizacja, zajęta i dostępna powierzchnia, miesięczna opłata za wynajem)."
string = TradeBook, "Księga handlowa"
string = TradeBook_Descr1, "Tutaj znajdziesz informację o narodowości i nazwie osady, jej położeniu oraz dacie, na którą odnotowano stan zapasów i ceny w tabeli po prawej stronie. Lista jest aktualizowana za każdym razem, gdy bohater otrzyma nowe dane handlowe. Z czasem informacje się dezaktualizują, ponieważ handel w grze żyje własnym życiem, ale pozwalają wyciągnąć najważniejsze wnioski. Na początku gry lista jest pusta. Aby jak najszybciej i najpełniej aktualizować wpisy, korzystaj z każdej okazji, by poznać ceny towarów w odległych osadach od kupców na morzu lub w tawernie, a także z plotek."
string = TradeBook_Descr2, "Lista towarów jest dość obszerna: niektóre są produkowane lub uprawiane wyłącznie na wyspach, inne na kontynencie, a część sprowadzana jest z odległej Europy. Towary eksportowane przez osadę nie są drogie, natomiast importowane – oczywiście, wręcz przeciwnie. Jeśli popyt na dany towar jest duży, a ilość znikoma, staje się on kontrabandą – nie jest już sprzedawany w sklepach. Niektóre niebezpieczne towary (na przykład broń i proch) mogą nawet zostać zakazane w oficjalnym handlu decyzją lokalnych władz."
string = TradeBook_Descr3, "Kolory wskaźnika typu produktu:\n- Zielony: Towary kolonialne\n- Niebieski: Towary importowane\n- Czerwony: Towary przemycane\n- Brzoskwiniowy: Towary o agresywnym popycie"
string = StatisticsBook, "Księga statystyk"
string = StatisticsBook_Descr, "Tutaj wyświetlane są podsumowania wydarzeń z gry (liczba pokonanych przeciwników, zdobyte nagrody, wydane pieniądze itp.)."
