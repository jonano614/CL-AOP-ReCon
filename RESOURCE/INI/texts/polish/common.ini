string = GameMenuHelper_1, "Warunki początkowe i pomoc"
string = GameMenuHelper_2, "Animacja postaci: "
string = GameMenuHelper_3, "\nWażne:\nJeśli postać przestała się poruszać po patchu, wejdź w ustawienia gry i kliknij 'Domyślne', a następnie 'Zastosuj'.\nPrzy niskim FPS zmniejsz rozdzielczość lub zmień parametr MSAA z 16 na 2 w launcherze.\nZalecamy nie ustawiać wysokiego limitu FPS w engine.ini (optymalnie 60-100) lub włączyć synchronizację pionową w launcherze.\nNową grę najlepiej zacząć z nową nazwą profilu!\nOpinie:\nMożesz zostawić swoją opinię w 'Społeczności Steam'.\nSzybsze i lepsze wsparcie online jest możliwe tylko na naszym serwerze Discord.\nPowodzenia i miłej gry!"
string = GameMenuHelper_4, "W profilu "
string = GameMenuHelper_5, " nie znaleziono plików zapisu."
string = GameMenuHelper_6, "W tym trybie gry możesz zapisać grę tylko w sali tawerny."
string = GameMenuHelper_7, "W tym trybie gry możesz zapisywać tylko w kościołach."
string = GameMenuHelper_8, "Za mało pieniędzy, by wykonać szybki zapis."
