string = Captain_no_withdrawn, "Tego kapitana nie można teraz usunąć."
string = Captain_needs_sailors, "Wymagana jest minimalna załoga na obu statkach.\nNie można wyznaczyć kapitana."
string = Captain_needs_officer, "Nie masz dostępnych oficerów.\n Nie można przydzielić kapitana."
string = Captain_large_squadron, "Eskadra bohatera może mieć tylko pięć okrętów."
