string = NPC_got_the_perk, " otrzymał cechę "
string = NPC_got_the_perk_woman, " otrzymała cechę "
string = Lost_the_perk, "Utraciłeś cechę "
string = NPC_lost_the_perk, " utracił cechę "
string = NPC_lost_the_perk_woman, " utracił cechę "
string = ChatacterInderfaceDescr_1, "Zadziała także, jeśli przypisano oficera "
string = ChatacterInderfaceDescr_2, ", który posiada ten perk."
string = ChatacterInderfaceDescr_3, "Ten perk nie kosztuje żadnych punktów."
string = ChatacterInderfaceDescr_4, "Stwórz własnego bohatera"
string = ChatacterInderfaceDescr_5, "Aby zmienić cechy bohatera, kliknij na nie i użyj strzałek, aby rozdzielić punkty.\nUmiejętności zostaną automatycznie przeliczone na podstawie wybranych P.I.R.A.T.E.S.\n\nZamknij formularz krzyżykiem lub klawiszem Esc po zakończeniu rozdzielania."
string = ChatacterInderfaceDescr_6, "Zwiększ atrybuty"
string = ChatacterInderfaceDescr_7, "Aby zwiększyć zdolności bohatera, wybierz je i dodaj punkty za pomocą strzałek. Pamiętaj, że nie możesz ich rozdzielić ponownie – możesz tylko wydać dostępne punkty. Zamknij okno krzyżykiem lub klawiszem Esc po zakończeniu rozdzielania. Jeśli przerwiesz rytuał bez rozdysponowania wszystkich punktów, pozostałe punkty przepadną!"
string = ChatacterInderfaceDescr_8, "Kliknij na liście, aby mianować lub odwołać oficera."
string = ChatacterInderfaceDescr_9, "Jeśli nie wyznaczono nagrody za twoją głowę, możesz pozostać incognito, stojąc bezczynnie w wrogim mieście lub przechodząc obok żołnierzy."
string = ChatacterInderfaceDescr_10, "\nJeśli Stealth i/lub Luck są maksymalne, przedmioty z bonusem do tych umiejętności zyskują drugie życie:\n+10% (-10% przy karze) od wartości do szansy.\n\nW nocy bazowa szansa jest o połowę mniejsza.\n\nDodatkowe bonusy (nie podlegają karom w nocy):\nCygańskie wróżby za 5000 dają +5% na 7 dni\nPerk 'Art of Deception' daje +5%\n\nWzór:\n'I' + 'S' + (('Stealth' / 3) + ('Luck' / 4)) + bonusy/kary z przedmiotów + dodatkowe bonusy\n"
string = ChatacterInderfaceDescr_11, "Szansa na skradanie się podczas chodzenia obok żołnierzy zamiast biegu: "
