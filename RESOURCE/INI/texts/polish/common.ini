string = MessageCrewCheckbox_4, "Przydział załogi"
string = MaxCrewSend, "do maksymalnej"
string = MaxCrewSend_descr, "Cała załoga z tego statku zostanie rozdzielona do twojej eskadry do maksymalnych wartości, z uwzględnieniem przeciążenia, zaczynając od okrętu flagowego."
string = MessageCrewCheckbox_1, "Wybierając opcję „do maksimum”, cała załoga z tego okrętu zostanie rozdzielona pomiędzy okręty eskadry do maksymalnych wartości, z uwzględnieniem przeciążenia, zaczynając od okrętu flagowego. W takim przypadku załoga zostaje uzupełniona do przeciążenia. Umiejętności i morale załogi zostaną przeliczone."
string = OptCrewSend, "do optymalnej"
string = OptCrewSend_descr, "Cała załoga z tego statku zostanie rozdzielona do twojej eskadry do optymalnych wartości, bez przeciążenia, zaczynając od okrętu flagowego."
string = MessageCrewCheckbox_2, "Po wybraniu opcji „do optymalnej” cała załoga z tego statku zostanie rozdzielona pomiędzy okręty twojej eskadry do optymalnych wartości, bez przeciążenia, zaczynając od okrętu flagowego. Umiejętności i morale załogi zostaną przeliczone."
string = FireEveryone, "zwolniony na ląd"
string = FireEveryone_descr, "Cała załoga tego statku zostanie zwolniona i skierowana do tawerny na lądzie, gdzie będzie oczekiwać na ponowny nabór."
string = MessageCrewCheckbox_3, "Wybierając opcję „wymustrowani na ląd”, cała załoga tego statku zostanie przeniesiona do tawerny na lądzie, łącząc swoje umiejętności z kandydatami już obecnymi w tawernie."
string = MessageGoodCheckbox_4, "Redystrybucja towarów"
string = GoodsToShip, "załaduj na okręt flagowy"
string = GoodsToShip_descr, "Wszystkie towary zostaną przeniesione na okręt flagowy, bez uwzględniania przeciążenia statku."
string = MessageGoodCheckbox_2, "Wybierając opcję „załaduj na okręt flagowy”, wszystkie towary zostaną przeniesione na okręt flagowy, bez uwzględniania przeciążenia statku."
string = GoodsToStore, "sprzedaj do sklepu"
string = GoodsToStore_descr, "Wszystkie towary zostaną sprzedane po aktualnych cenach kolonii. Kontrabanda zostaje załadowana na okręt flagowy, bez uwzględniania przeciążenia. Jeśli okręt flagowy zostanie odstawiony do stoczni, kontrabanda zostanie zniszczona."
string = MessageGoodCheckbox_1, "Wybierając opcję „sprzedaj do sklepu”, wszystkie towary zostaną sprzedane po cenach obowiązujących w danej kolonii. Kontrabanda zostanie załadowana na okręt flagowy, bez uwzględniania przeciążenia. Jeśli okręt flagowy zostanie zadokowany w stoczni, kontrabanda zostanie zniszczona."
string = GoodsToWarehouse, "rozładuj do magazynu"
string = GoodsToWarehouse_descr, "Wszystkie towary zostaną przeniesione do magazynu, jeśli jest dostępny."
string = MessageGoodCheckbox_3, "Po wybraniu opcji „rozładuj do magazynu” wszystkie towary zostaną przeniesione do magazynu na przechowanie, jeśli jest dostępny."
