string = ItemsTradeInfo, "Nur nicht ausgerüstete Gegenstände zählen zur Anzahl der Gegenstände deines Charakters."
string = ItemsColonTitle, "Gegenstandsname"
string = ItemsHelper_1, "In dieser Ansicht kannst du deinem Charakter einen Säbel, eine Pistole, ein Fernrohr und einen Kürass zuweisen und ausrüsten. "
string = ItemsHelper_2, "Du kannst auch den Inventarstatus von Offizieren, Begleitern und Passagieren einsehen. Sie wählen ihre Ausrüstung automatisch, sobald du ihnen neue Gegenstände gibst. "
string = ItemsHelper_3, "Der Austausch von Gegenständen mit deinen Offizieren erfolgt an Land über den Befehl „Austausch“ oder über eine Dialogoption."
string = ItemsHelper_4, "Diese Waffe ist mystisch mit ihrem Besitzer verbunden. In seinen Händen erhöht sich der Schaden dieser Klinge um "
string = ItemsHelper_5, "Doppelklick oder Enter auf eine Tabellenzeile öffnet das Formular für den Itemtausch "
string = ItemsHelper_6, "Shift + Links/Rechts auf den Tabellenzeilen öffnet automatisch ein Formular mit voreingestellter Kauf-/Verkaufsmenge auf das Maximum. "
string = ItemsHelper_7, "Geben Sie eine positive Zahl ein, um den Gegenstand zu entnehmen, und eine negative Zahl, um ihn zurückzugeben."
string = ItemsHelper_8, "Mit den Pfeiltasten links/rechts änderst du die Menge einzeln, mit Shift + links/rechts auf das Maximum. Enter auf einem Formular entspricht OK, Esc entspricht Abbrechen."
string = ItemsHelper_9, "Im Formularmodus kannst du beim Scrollen der Liste mit den Pfeiltasten nach oben/unten die Beschreibung des Elements unter dem Tabellen-Cursor anzeigen."
string = ItemsHelper_10, "In der Tauschliste sind keine von Charakteren ausgerüsteten Gegenstände enthalten."
string = ItemsHelper_11, "Schnelles Zurückgeben aller: Pfeile hoch/runter in der Liste, Shift + rechts, Enter"
