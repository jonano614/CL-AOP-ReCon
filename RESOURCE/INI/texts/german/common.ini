string = Leadership_Descr, "Führung zeigt, wie viel Einfluss du auf die Menschen um dich herum hast und wie gut du deine Ziele erreichen kannst."
string = Sailing_Descr, "Navigation zeigt, wie gut du dein Schiff steuern kannst, und beeinflusst seine Geschwindigkeit und Manövrierfähigkeit."
string = Fencing_Descr, "Fechten ist für jeden Kapitän wichtig, denn oft hängt das eigene Überleben vom Umgang mit der Klinge ab."
string = Gun_Descr, "Ein gut gezielter Schuss, der einen oder mehrere Feinde ausschaltet, kann dir das Leben retten."
string = Cannons_Descr, "Diese Fertigkeit beeinflusst die Nachladezeit deiner Kanonen und das Schussmuster."
string = Accuracy_Descr, "Diese Fertigkeit zeigt, wie gut du das Kanonenfeuer gezielt platzieren kannst."
string = Grappling_Descr, "Diese Fähigkeit zeigt, wie gut du den besten Ort, die richtige Distanz und den passenden Zeitpunkt für ein Entern wählst – und wie gut deine Crew gemeinsam zum Sieg kämpft."
string = Defence_Descr, "Bequeme Mannschaftsquartiere, Hygiene und die Versorgung Verwundeter erhöhen die Zahl der Überlebenden nach schweren Gefechten und langen Reisen."
string = Repair_Descr, "Gute Kenntnisse deines Schiffs und seiner Bauweise ermöglichen einen effektiveren Einsatz der Reparaturcrew."
string = Commerce_Descr, "Die Fähigkeit zu feilschen, Warenqualität auf einen Blick zu erkennen und ein weites Netzwerk an Kontakten ermöglichen es dir, Handelsgeschäfte zu deinem Vorteil abzuschließen."
string = Sneak_Descr, "Glück, Weitblick, ein Gespür für Gefahr oder schnelles Geld – je mehr du diese Fertigkeit entwickelst, desto mehr hast du Glück."
string = Navigator_Descr, "Die Fähigkeit, ein Schiff sowohl bei Flaute als auch im tobenden Sturm sicher zu steuern, ist für einen Kapitän unerlässlich – und der Navigator ist derjenige, der ihm dabei zur Seite steht. Im hitzigen Gefecht kann er es sein, der das Ruder im letzten Moment herumreißt und das Schiff so vor feindlichem Beschuss bewahrt."
string = Boatswain_Descr, "Man sagt, Bootsmänner werden auf ihrem Schiff geboren. Ihr Wissen über ihr Handwerk und die kleinen Dinge des Lebens auf See ist unübertroffen. Ein guter Bootsmann weiß, wie er das Beste aus seinem Schiff herausholt, die Crew für die bevorstehende Schlacht motiviert und das Schiff wieder flottmacht."
string = Cannoner_Descr, "Ein erfahrener Kanonier kann den Ausgang einer Seeschlacht im Handumdrehen wenden. Seine Erfahrung und sein Können sorgen für präziseren Beschuss mit den Schiffskanonen. Außerdem achtet der Kanonier darauf, dass die Kanonen stets trocken und einsatzbereit sind."
string = Doctor_Descr, "Ein Schiffsarzt kümmert sich um alle, die während eines Gefechts verletzt wurden. Er muss Gliedmaßen amputieren, Wunden nähen, Epidemien vorbeugen und der Crew weitere medizinische Hilfe leisten können. Ein guter Chirurg kann das Leben vieler deiner Männer retten."
string = Treasurer_Descr, "Ein Zahlmeister kümmert sich um den Laderaum und alle Waren darin. Außerdem ist ein Zahlmeister immer ein erfahrener Händler, der dem Kapitän hilft, günstig einzukaufen und gute Preise auszuhandeln."
string = Carpenter_Descr, "Ein guter Zimmermann kann Schäden am Schiff beheben, die durch Stürme oder feindliches Feuer entstanden sind. Meistens beginnt er mit den Reparaturen direkt nach dem Ende einer Schlacht. Ein erfahrener Zimmermann weiß genau, was zuerst ausgebessert werden muss, damit das Schiff nicht untergeht."
string = Officer_Descr, "Das Leben steckt voller Gefahren und Überraschungen. In einer dunklen Gasse könnten Räuber lauern, und beim Entern kann dich eine verirrte Kugel treffen. Deshalb brauchst du einen Fighter – jemanden, der im Grunde dein Leibwächter ist."
