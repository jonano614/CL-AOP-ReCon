string = Surrendered_crew, "Der Feind hat sich ohne Kampf deinem Erbarmen ergeben."
string = Surrendered_captain, "Als ihnen klar wurde, dass Widerstand zwecklos war, haben sich der Kapitän und die übrige Crew deinem Erbarmen ausgeliefert."
string = Surrendered_text_1, "Es ist nicht möglich, Crew zwischen Schiffen zu verschieben, die dir nicht gehören. Um das Schiff vollständig zu übernehmen, musst du seinen Kapitän absetzen und einen eigenen ernennen."
string = Surrendered_text_2, "Wenn Sie den Kapitän des ergebenen Schiffs entfernen, können Sie das Schiff nach der Plünderung nicht freilassen. Fortfahren?"
string = Surrendered_exit_1, "Das Schiff ist ohne Kapitän. Versenken?"
string = Surrendered_exit_2, "Beute beenden und den ergebenen Kapitän samt Crew freilassen? Sie haben versprochen, nicht mehr auf uns zu schießen."
string = Surrendered_captain_capture, "Wähle das Schicksal des ergebenen Kapitäns."
string = Surrendered_captain_capture_1, "Über Bord werfen"
string = Surrendered_captain_capture_2, "Gefangen nehmen"
string = Surrendered_crew_capture, "Wähle das Schicksal der ergebenen Matrosen."
string = Surrendered_crew_capture_1, "Alle über Bord werfen"
string = Surrendered_crew_capture_2, "Jeden von ihnen versklaven"
string = Surrendered_crew_capture_3, "Auf den Rettungsbooten freilassen"
string = Surrendered_wishes, "Ein Teil der feindlichen Crew möchte sich euch anschließen."
string = Pay_for_ship, "Schiffsunterhalt:"
string = Max_crew_text1, "Die Crewstärke kann das Maximum überschreiten, doch dies führt zu Überlastung und miserablen Lebensbedingungen an Bord, was einen täglichen Moralverlust zur Folge hat. Im Schnitt können bis zu 25 % mehr Seeleute aufgenommen werden."
string = Max_crew_text2, "Maximale Crewanzahl einschließlich Überladung:"
string = Caliber_text1, "Doppelklick oder Enter in diesem Feld zeigt die an den Seiten montierten Kanonen an."
