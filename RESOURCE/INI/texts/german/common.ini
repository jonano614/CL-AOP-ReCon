string = MaxCrewSend, "bis zum Maximum"
string = MaxCrewSend_descr, "Die gesamte Crew dieses Schiffs wird unter Berücksichtigung einer Überlastung auf dein Geschwader verteilt, beginnend mit dem Flaggschiff, bis die Maximalwerte erreicht sind."
string = MessageCrewCheckbox_1, "Wenn Sie die Option „bis zum Maximum“ wählen, wird die gesamte Crew dieses Schiffs beginnend mit dem Flaggschiff auf Ihre Flotte verteilt, bis die maximalen Werte erreicht sind, Überladung inbegriffen. In diesem Fall wird die Crew bis zur Überladung aufgefüllt. Die Fähigkeiten und die Moral der Crew werden dabei neu berechnet."
string = OptCrewSend, "auf ein optimales"
string = OptCrewSend_descr, "Die gesamte Crew dieses Schiffs wird beginnend mit dem Flaggschiff optimal und ohne Überlastung auf dein Geschwader verteilt."
string = MessageCrewCheckbox_2, "Wenn Sie die Option „auf optimal“ wählen, wird die gesamte Crew dieses Schiffs beginnend mit dem Flaggschiff auf Ihre Flotte verteilt, sodass die optimalen Werte ohne Überladung erreicht werden. Die Fähigkeiten und die Moral der Crew werden dabei neu berechnet."
string = FireEveryone, "an Land entlassen"
string = FireEveryone_descr, "Die gesamte Crew dieses Schiffs wird an Land in die Taverne entlassen und wartet dort auf eine neue Anwerbung."
string = MessageCrewCheckbox_3, "Wenn Sie die Option „an Land entlassen“ wählen, wird die gesamte Crew dieses Schiffs in die Taverne an Land entlassen und ihre Skills mit den dortigen Bewerbern zusammengelegt."
string = MessageGoodCheckbox_4, "Warenverteilung"
string = GoodsToShip, "auf das Flaggschiff verladen"
string = GoodsToShip_descr, "Alle Waren werden auf das Flaggschiff übertragen, ohne die Überladung des Schiffs zu berücksichtigen."
string = MessageGoodCheckbox_2, "Wenn Sie die Option „auf das Flaggschiff verladen“ wählen, werden alle Waren auf das Flaggschiff übertragen, ohne die Überladung des Schiffs zu berücksichtigen."
string = GoodsToStore, "an Laden verkaufen"
string = GoodsToStore_descr, "Alle Waren werden zu den aktuellen Koloniepreisen verkauft. Schmuggelware wird auf das Flaggschiff geladen, Überladung wird dabei nicht berücksichtigt. Liegt das Flaggschiff im Dock, wird die Schmuggelware vernichtet."
string = MessageGoodCheckbox_1, "Wenn du die Option „Im Laden verkaufen“ wählst, werden alle Waren zum aktuellen Koloniepreis verkauft. Schmuggelware wird auf das Flaggschiff verladen, ohne Überladung zu berücksichtigen. Liegt das Flaggschiff im Dock, wird die Schmuggelware zerstört."
