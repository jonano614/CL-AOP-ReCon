string = CannonsTradeInterfaceDescr_2, "Kanonen können auf diesem Schiff nicht installiert werden"
string = CannonsTradeInterfaceDescr_3, "Kanonen bereits auf dem Schiff installiert"
string = AlchemyInterfaceDescr_1, "Um Gegenstände herzustellen, wähle oben ein Rezept aus der Liste und stelle unten mit den Pfeilen die gewünschte Menge ein.\n"
string = AlchemyInterfaceDescr_2, "Drücken Sie dann auf die Schaltfläche „Erstellen“ (sie wird aktiv, sobald die Anzahl der Komponenten den Rezeptanforderungen entspricht).\n\nAusgerüstete Gegenstände werden in der Liste der verfügbaren Komponenten nicht angezeigt."
string = AlchemyInterfaceDescr_3, "Solange du dich in deiner Kajüte befindest, stehen dir alle Komponenten und Werkzeuge aus den Truhen zur Verfügung – du musst sie nicht ins Inventar verschieben.\n\n"
string = AlchemyInterfaceDescr_4, "Rechtsklick, um diese Nachricht zu schließen."
