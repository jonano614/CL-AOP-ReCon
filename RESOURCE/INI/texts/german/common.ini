string = QuestsBook, "Questbuch"
string = QuestsBook_Descr, "Hier wird eine Liste der aktuellen Quests, aktiven Handlungsevents und der Aktionen des Hauptcharakters angezeigt. Im erscheinenden chronologischen Verlauf thematischer Ereignisse ist jeder neue Eintrag mit dem Zeitpunkt seiner Aufnahme ins Journal markiert und steht über den vorherigen. Ungelesene Einträge werden farblich hervorgehoben."
string = QuestsLogBook, "Quest-Archiv"
string = QuestsLogBook_Descr, "Hier wird eine Liste abgeschlossener Quests, Aufträge und beendeter Story-Abenteuer angezeigt."
string = DocsBook, "Dokumente"
string = DocsBook_Descr, "Hier werden verschiedene Dokumente angezeigt, die der Hauptcharakter im Spiel erhält (Manuskripte und deren Fragmente, Briefe und einfache Notizen, Anweisungen und allerlei Rezepte). Schauen Sie von Zeit zu Zeit in diesen Abschnitt, um die Materialien durchzugehen. Sie können Hinweise enthalten oder auf wichtige Ereignisse der jüngeren Vergangenheit hinweisen. Ungelesene Dokumente sind farblich hervorgehoben."
string = CashBook, "Kassenbuch"
string = CashBook_Descr1, "Hier werden alle Aufzeichnungen über die finanziellen Unternehmungen des Hauptcharakters angezeigt, einschließlich der von ihm aufgenommenen Kredite (Liste links) oder der von ihm vergebenen Darlehen (Liste rechts). Neben dem Betrag des Kredits oder der Einlage im Bankhaus enthalten die Einträge zusätzliche Informationen (Zinssätze, Daten, Laufzeiten und Währungstyp)."
string = CashBook_Descr2, "Wichtig! Wird die Siedlung, bei deren Geldverleiher das Geld gegen Zinsen hinterlegt wurde, geplündert, verschwindet die Einlage und der Eintrag wird aus dem Buch entfernt."
string = ShipsPlaceBook, "Schiffe bei der Hafenbehörde"
string = ShipsPlaceBook_Descr1, "Hier siehst du die Schiffe, die dem Protagonisten aktuell zur Verfügung stehen und eingelagert wurden. Die Liste enthält Informationen zu jedem Schiff (Klasse, Schiffsname, Name des Kapitäns, Standort des gemieteten Liegeplatzes, Einlagerungsdatum und monatliche Lagergebühr)."
string = ShipsPlaceBook_Descr2, "Drücken Sie SHIFT + LMB für Schiffsinfos"
string = ShipsPlaceBook_Descr3, "Drücken Sie STRG + LMT für Informationen über den Kapitän"
string = StorageBook, "Lagerbuch"
string = StorageBook_Descr, "Hier werden Aufzeichnungen über gemietete Lagerhäuser oder Packhäuser angezeigt (deren Standort, genutzter und verfügbarer Platz, monatliche Mietzahlung)."
string = TradeBook, "Handelsbuch"
string = TradeBook_Descr1, "Hier werden die Nationalität und der Name der Siedlung, ihr Standort sowie das Datum aufgeführt, an dem der Warenbestand und die Preise in der Tabelle rechts festgehalten wurden. Die Liste wird jedes Mal aktualisiert, wenn der Held neue Handelsinformationen erhält. Mit der Zeit veralten die Angaben, da der Handel im Spiel seine eigene Dynamik hat, doch sie ermöglichen grundlegende Schlüsse. Zu Beginn des Spiels ist die Liste leer. Um die Einträge möglichst vollständig und schnell zu aktualisieren, solltest du jede Gelegenheit nutzen, um von Händlern auf See oder in Tavernen sowie durch Gerüchte die Preise in fernen Siedlungen zu erfahren."
string = TradeBook_Descr2, "Die Warenliste ist ziemlich umfangreich: Manche werden nur auf den Inseln hergestellt oder angebaut, andere auf dem Festland, und einige werden aus dem fernen Europa importiert. Die vom Ort exportierten Waren sind nicht teuer, die importierten hingegen natürlich schon. Ist die Nachfrage nach einer Ware groß und die Menge gering, wird sie zur Schmuggelware – sie wird dann nicht mehr in den Läden verkauft. Manche gefährlichen Waren (zum Beispiel Waffen und Schießpulver) können von den örtlichen Behörden sogar ganz aus dem offiziellen Handel verbannt werden."
string = TradeBook_Descr3, "Produktart-Indikatorfarben:\n- Grün: Kolonialwaren\n- Blau: Importwaren\n- Rot: Schmuggelware\n- Pfirsich: Waren mit aggressiver Nachfrage"
string = StatisticsBook, "Statistikbuch"
string = StatisticsBook_Descr, "Hier werden Zusammenfassungen der Spielereignisse angezeigt (Anzahl besiegter Gegner, erbeutete Preise, ausgegebenes Geld usw.)."
