string = TradeInterfaceDescr_1, "Doppelklick oder Enter auf eine Tabellenzeile öffnet das Formular für Warenkauf/-verkauf. "
string = TradeInterfaceDescr_2, "Shift + Links/Rechts auf den Tabellenzeilen ruft automatisch das Formular mit der voreingestellten maximalen Kauf-/Verkaufsmenge auf. "
string = TradeInterfaceDescr_3, "Wenn Sie eine positive Menge über die Tastatur eingeben, wird der Kauf der Ware festgelegt, bei einer negativen Menge der Verkauf."
string = TradeInterfaceDescr_4, "Mit den Pfeiltasten links/rechts änderst du die Menge in Packungen, mit Shift + links/rechts auf das Maximum. Enter auf dem Formular entspricht OK, Esc ist Abbrechen."
string = TradeInterfaceDescr_5, "Im Formularmodus kannst du beim Scrollen mit den Pfeiltasten in der Tabelle die Warenbeschreibung unter dem Tabellen-Cursor ansehen."
string = TradeInterfaceDescr_6, "Schnellverkauf aller Gegenstände: Pfeil hoch/runter in der Liste, Shift + rechts, Enter"
string = TradeInterfaceDescr_7, "Farbunterscheidung von Waren"
string = TradeInterfaceDescr_8, "Mit einem Handelsassistenten"
string = TradeInterfaceDescr_9, "Alles schnell nehmen: Mit den Pfeiltasten hoch/runter durch die Liste, Shift + rechts, Enter."
string = TradeInterfaceDescr_10, "Die Verkaufsliste enthält keine vom Charakter ausgerüsteten Gegenstände."
string = TradeInterfaceDescr_11, "Doppelklick oder Enter auf eine Tabellenzeile öffnet das Formular zum Kaufen/Verkaufen von Gegenständen. "
string = TradeInterfaceDescr_12, "Shift + Links/Rechts auf Tabellenzeilen öffnet automatisch ein Formular mit voreingestellter maximaler Kauf-/Verkaufsmenge. "
string = TradeInterfaceDescr_13, "Wenn Sie eine positive Menge über die Tastatur eingeben, wird der Kauf des Gegenstands festgelegt, bei einer negativen Menge (mit Minuszeichen) der Verkauf."
string = TradeInterfaceDescr_14, "Im Formularmodus kannst du beim Scrollen der Liste mit den Pfeiltasten nach oben/unten die Beschreibung des Elements unter dem Tabellen-Cursor anzeigen."
string = TradeInterfaceDescr_15, "in der Kajüte"
