string = ChatacterInderfaceDescr_1, "Funktioniert auch, wenn ein Offizier zugewiesen ist "
string = ChatacterInderfaceDescr_2, ", der diesen Perk besitzt."
string = ChatacterInderfaceDescr_3, "Dieser Perk kostet keine Punkte."
string = ChatacterInderfaceDescr_4, "Erschaffe deinen eigenen Helden"
string = ChatacterInderfaceDescr_5, "Um die Fähigkeiten des Helden zu ändern, klicken Sie darauf und verwenden Sie die Pfeile, um die Punkte neu zu verteilen.\nDie Fertigkeiten werden automatisch anhand der gewählten P.I.R.A.T.E.S. neu berechnet.\n\nSchließen Sie das Formular mit dem Kreuz oder Esc, wenn die Verteilung abgeschlossen ist."
string = ChatacterInderfaceDescr_6, "Fähigkeiten erhöhen"
string = ChatacterInderfaceDescr_7, "Um die Fähigkeiten des Helden zu erhöhen, wählen Sie sie aus und fügen Sie mit den Pfeilen Punkte hinzu. Beachten Sie, dass Sie die Fähigkeiten nicht neu verteilen können – Sie können nur verfügbare Punkte ausgeben. Schließen Sie das Formular mit dem Kreuz oder Esc, wenn die Verteilung abgeschlossen ist. Wenn Sie das Ritual abbrechen, ohne alle Punkte zu verteilen, gehen die verbleibenden Punkte verloren!"
string = ChatacterInderfaceDescr_8, "Klicken Sie auf die Liste, um einen Offizier zu ernennen oder abzuberufen."
string = ChatacterInderfaceDescr_9, "Wenn kein Kopfgeld auf dich ausgesetzt ist, kannst du in einer feindlichen Stadt unauffällig bleiben, indem du stehen bleibst oder ruhig an Soldaten vorbeigehst."
string = ChatacterInderfaceDescr_10, "\nWenn Stealth und/oder Luck auf dem Maximum sind, erhalten Gegenstände mit Bonus auf diese Skills ein zweites Leben:\n+10 % (bzw. -10 % bei Malus) des Werts als Chance.\n\nNachts ist die Grundchance halb so hoch.\n\nZusätzliche Boni (nachts nicht von Malus betroffen):\nWahrsagung durch eine Zigeunerin für 5000 gewährt +5 % für 7 Tage\nDer Perk 'Art of Deception' gibt +5 %\n\nFormel:\n'I' + 'S' + (('Stealth' / 3) + ('Luck' / 4)) + Boni/Mali durch Gegenstände + zusätzliche Boni\n"
string = ChatacterInderfaceDescr_11, "Chance auf Tarnung beim Gehen statt Laufen in der Nähe von Soldaten: "
