string = GameMenuHelper_1, "Startbedingungen und Hilfe"
string = GameMenuHelper_2, "Charakteranimation: "
string = GameMenuHelper_3, "\nWichtig:\nFalls sich der Charakter nach dem Patch nicht mehr bewegen lässt, gehen Sie in die Spieleinstellungen, klicken Sie auf 'Standard' und dann auf 'Übernehmen'.\nBei niedrigen FPS reduzieren Sie die Auflösung oder ändern Sie den MSAA-Parameter im Launcher von 16 auf 2.\nWir empfehlen, keine zu hohen FPS in der engine.ini einzustellen (optimal sind 60-100) oder die vertikale Synchronisation im Launcher zu aktivieren.\nStarten Sie ein neues Spiel vorzugsweise mit einem neuen Profilnamen!\nFeedback:\nSie können Feedback in der 'Steam Community' hinterlassen.\nSchnellerer und besserer Online-Support ist nur über unseren Discord-Server möglich.\nViel Erfolg und viel Spaß beim Spielen!"
